<head>

    <!-- Tailwind CSS -->

    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Google Fonts for a crisp, modern SaaS look -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #f8fafc;
            color: #0f172a;
            overflow: hidden;
        }

        /* Smooth Accordion Transitions */
        .accordion-content {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
        }
        .accordion-content.open {
            max-height: 2000px;
            opacity: 1;
            margin-top: 1rem;
        }
        .accordion-content.closed {
            max-height: 0;
            opacity: 0;
            margin-top: 0;
        }

        /* Modern Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* Themed Tags for Light Mode SaaS */
        .tag-mandatory { background-color: #fef2f2; color: #b91c1c; border: 1px solid #fca5a5; padding: 2px 8px; border-radius: 9999px; font-size: 0.65rem; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; margin-right: 8px; vertical-align: middle; display: inline-block; }
        .tag-optional { background-color: #f1f5f9; color: #475569; border: 1px solid #cbd5e1; padding: 2px 8px; border-radius: 9999px; font-size: 0.65rem; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; margin-right: 8px; vertical-align: middle; display: inline-block; }
        .tag-ask { background-color: #fffbeb; color: #b45309; border: 1px solid #fcd34d; padding: 2px 8px; border-radius: 9999px; font-size: 0.65rem; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; margin-right: 8px; vertical-align: middle; display: inline-block; }
        .tag-script { background-color: #eff6ff; color: #1d4ed8; border: 1px solid #bfdbfe; padding: 2px 8px; border-radius: 9999px; font-size: 0.65rem; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; margin-right: 8px; vertical-align: middle; display: inline-block; }
        .tag-dd { background-color: #f0fdfa; color: #0f766e; border: 1px solid #99f6e4; padding: 2px 8px; border-radius: 9999px; font-size: 0.65rem; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; margin-right: 8px; vertical-align: middle; display: inline-block; }
        .tag-warning { background-color: #fdf2f8; color: #be185d; border: 1px solid #fbcfe8; padding: 2px 8px; border-radius: 9999px; font-size: 0.65rem; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; margin-right: 8px; vertical-align: middle; display: inline-block; }
        
        /* Timeline Connector */
        .timeline-line {
            position: absolute;
            left: 1.25rem;
            top: 3rem;
            bottom: 0;
            width: 2px;
            background-color: #e2e8f0;
            z-index: 0;
        }

        /* Print Specific Styling */
        @media print {
            body { overflow: visible !important; background-color: white !important; }
            aside, header, .no-print, .toggle-switch-ui { display: none !important; }
            main { width: 100% !important; margin: 0 !important; padding: 0 !important; overflow: visible !important; display: block !important; }
            
            /* Forces all accordions open regardless of React state */
            .accordion-content, .accordion-content.closed { 
                max-height: none !important; 
                opacity: 1 !important; 
                display: block !important; 
                visibility: visible !important;
                margin-top: 1rem !important; 
                overflow: visible !important;
            }
            .lucide-chevron-down { display: none !important; } /* Hide arrows in print */
            
            .print-break-inside-avoid { page-break-inside: avoid; }
            .shadow-sm, .shadow-md, .shadow-lg { box-shadow: none !important; border-color: #cbd5e1 !important; }
            * { color: #000 !important; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // ============================================================
        // 100% COMPLETE TRACK DATA
        // ============================================================
        const listFreeholdData = [
            {
                phase: "Phase 1: Pre-Listing Research & Primer",
                description: "Handling TRESA compliance and legal due diligence before you even step into the house.",
                items: [
                    { id: "lf_due_diligence", title: "1. Pre-Listing Due Diligence", badge: "Office Research", color: "bg-teal-50 text-teal-700 border border-teal-200", icon: "search", description: "Mandatory legal checks to perform BEFORE the appointment.", sections: [{ title: "Title, Ownership & Legal Advisory", steps: ["<span class='tag-dd'>[DUE DILIGENCE]</span> <strong>GeoWarehouse:</strong> Pull the property report to verify exact legal names on title. You cannot legally list unless all owners sign.", "<span class='tag-dd'>[DUE DILIGENCE]</span> <strong>Estates/POA:</strong> If deceased or using a POA, you MUST obtain the Certificate of Appointment of Estate Trustee or the POA document.", "<span class='tag-dd'>[DUE DILIGENCE]</span> <strong>Mortgage Check:</strong> Verify outstanding mortgage vs. estimated sale price. Does the seller have enough equity?", "<span class='tag-dd'>[DUE DILIGENCE]</span> <strong>Tax Arrears:</strong> Check if property taxes are up‑to‑date via the municipal portal.", "<span class='tag-dd'>[DUE DILIGENCE]</span> <strong>Lawyer:</strong> Advise the seller to retain a real estate lawyer early to handle title transfer, mortgage discharge, and statement of adjustments."] }] },
                    { id: "lf_pre_email", title: "2. Advance Email & RECO Delivery", badge: "Procedure & Script", color: "bg-blue-50 text-blue-700 border border-blue-200", icon: "mail", description: "Send 24‑48 hours before your meeting.", sections: [{ title: "Email Template", steps: ["<span class='tag-mandatory'>[MANDATORY]</span> You must provide the RECO Guide before providing services.", "<div class='bg-slate-50 border border-slate-200 p-4 rounded-lg mt-2 text-sm text-slate-700 italic border-l-4 border-l-blue-500 shadow-sm'><strong>Subject:</strong> Looking forward to our meeting + Important Info<br><br>Hi [Client Name],<br><br>I am looking forward to our meeting tomorrow. Because the province recently updated the rules for real estate representation, I am required by law to provide you with the attached RECO Information Guide before we officially begin our services. Please give it a quick read-through. We will briefly touch on it tomorrow.<br><br>Best,<br>Ken Morgan</div>"] }] }
                ]
            },
            {
                phase: "Phase 2: The Kitchen Table (Contracts)",
                description: "Command the room. Bring these forms printed. Secure wet-ink signatures.",
                items: [
                    { id: "lf_reco", title: "3. Setting the Agenda & RECO Sign-off", badge: "Dialogue", color: "bg-indigo-50 text-indigo-700 border border-indigo-200", icon: "message-circle", description: "Opening the meeting and TRESA acknowledgment.", sections: [{ title: "Script & Sign-off", steps: ["<span class='tag-script'>[SCRIPT]</span> <em>\"Did you have a chance to glance at the RECO guide I emailed over? It confirms that I am acting as your Designated Representative. My sole loyalty is to you, the Seller.\"</em>", "<span class='tag-mandatory'>[MANDATORY]</span> Have all Sellers sign and date the printed Page 13 Acknowledgement."] }] },
                    { id: "lf_form271", title: "4. OREA Form 271 — Listing Agreement", badge: "Paper Contract", color: "bg-amber-50 text-amber-700 border border-amber-200", icon: "file-signature", description: "The core legal contract securing you as Designated Representative.", sections: [{ title: "Form Breakdown", steps: ["<span class='tag-mandatory'>[MANDATORY]</span> <strong>Designated Rep:</strong> Your exact name. (Crucial TRESA rule).", "<span class='tag-mandatory'>[MANDATORY]</span> <strong>Dates:</strong> Commencing and Expiring times.", "<span class='tag-mandatory'>[MANDATORY]</span> <strong>Commission:</strong> Total %, Co‑op %, and Holdover days.", "<span class='tag-ask'>[ASK SELLER]</span> <strong>HST on Commission:</strong> Confirm that HST is charged on top of the agreed commission. Clarify whether the stated commission includes or excludes HST.", "<span class='tag-dd'>[DUE DILIGENCE]</span> <span class='tag-ask'>[ASK SELLER]</span> <strong>Spousal Consent:</strong> Is it a matrimonial home and spouse isn't on title? They must sign Page 4.", "<span class='tag-mandatory'>[MANDATORY]</span> <strong>Schedule A:</strong> Ensure Casora's Schedule A is attached and initialled."] }] },
                    { id: "lf_fintrac", title: "5. FINTRAC ID Records", badge: "Paper Form", color: "bg-amber-50 text-amber-700 border border-amber-200", icon: "fingerprint", description: "Federal anti-money laundering verification.", sections: [{ title: "Verification", steps: ["<span class='tag-mandatory'>[MANDATORY]</span> Check Driver's License or Passport. Copy ID Number and Expiry exactly.", "<span class='tag-ask'>[ASK SELLER]</span> Ask for their Principal Business/Occupation.", "<span class='tag-mandatory'>[MANDATORY]</span> Section D (Purpose): Check 'Residential Property' and 'Sale'.", "<span class='tag-mandatory'>[MANDATORY]</span> Determine if the client is a Politically Exposed Person (PEP), Head of an International Organization (HIO), or appears on any sanctions list (OFAC, OSFI). This is required under FINTRAC regulations."] }] },
                    { id: "lf_form244", title: "6. Form 244 & Lockbox Direction", badge: "Paper Contract", color: "bg-amber-50 text-amber-700 border border-amber-200", icon: "lock", description: "Rules of engagement for offers and property access.", sections: [{ title: "Form 244 & Lockbox", steps: ["<span class='tag-ask'>[ASK SELLER]</span> <strong>Holding Offers:</strong> If holding, enter Date/Time and check YES or NO for Pre-emptive offers.", "<span class='tag-mandatory'>[MANDATORY]</span> <strong>Lockbox:</strong> Get signature authorizing the lockbox placement."] }] },
                    { id: "lf_form161", title: "7. OREA Form 161 (Disclosure)", badge: "Conditional Form", color: "bg-red-50 text-red-700 border border-red-200", icon: "alert-triangle", description: "ONLY if you or a family member/Casora! own the property.", sections: [{ title: "When & How to use", steps: ["<span class='tag-mandatory'>[MANDATORY]</span> If YOU or the brokerage own the property, you must declare it using this form."] }] }
                ]
            },
            {
                phase: "Phase 3: Back-Office Polish & MLS",
                description: "Drafting the MLS data at your desk and sending for e-signature.",
                items: [
                    { id: "lf_mls", title: "8. PropTx 290 & BrokerBay", badge: "Digital Entry", color: "bg-cyan-50 text-cyan-700 border border-cyan-200", icon: "monitor", description: "MLS data and showing instructions for FREEHOLD listings.", sections: [{ title: "Setup", steps: ["<span class='tag-mandatory'>[MANDATORY]</span> Use PropTx 290 (Freehold Sale).", "<span class='tag-mandatory'>[MANDATORY]</span> Fill room measurements, taxes, and legal description.", "<span class='tag-mandatory'>[MANDATORY]</span> Set up BrokerBay contacts and offer email.", "<span class='tag-mandatory'>[MANDATORY]</span> Email both to Seller via DocuSign/Authentisign for final approval before going live."] }] }
                ]
            },
            {
                phase: "Phase 4: Deal Completion",
                description: "Processing the firm deal.",
                items: [
                    { id: "lf_dealsummary", title: "9. CASORA Deal Summary", badge: "Internal Form", color: "bg-purple-50 text-purple-700 border border-purple-200", icon: "briefcase", description: "Submitted when a deal goes FIRM.", sections: [{ title: "Financials", steps: ["<span class='tag-mandatory'>[MANDATORY]</span> Enter the exact Deposit held by Casora.", "<span class='tag-mandatory'>[MANDATORY]</span> Break down commission due to Casora and the Co‑op Brokerage.", "<span class='tag-mandatory'>[MANDATORY]</span> Submit with Firm APS, Form 271, FINTRAC, RECO Ack, Form 244, and any waivers."] }] }
                ]
            }
        ];

        const listCondoData = [
            {
                phase: "Phase 1: Pre-Listing Condo Research",
                description: "Condos require specific data before the kitchen table meeting.",
                items: [
                    { id: "lc_due_diligence", title: "1. Condo Due Diligence", badge: "Office Research", color: "bg-teal-50 text-teal-700 border border-teal-200", icon: "search", description: "Mandatory checks specific to condominium properties.", sections: [{ title: "Condo Verifications", steps: ["<span class='tag-dd'>[DUE DILIGENCE]</span> <strong>GeoWarehouse:</strong> Find Condominium Plan No., Legal Name of Condo Corp, Unit Number, Level No., and Building No.", "<span class='tag-dd'>[DUE DILIGENCE]</span> <strong>Parking/Locker:</strong> Verify if Parking and Locker are owned (Deeded) or Exclusive Use.", "<span class='tag-dd'>[DUE DILIGENCE]</span> <strong>Status Certificate:</strong> Does the Seller have a current Status Certificate? If not, advise them to order one (maximum fee $100 under the Condominium Act, 1998). The corporation must deliver it within 10 calendar days — plan ahead.", "<span class='tag-dd'>[DUE DILIGENCE]</span> <strong>Arrears:</strong> Ask the seller if they have any outstanding common expenses or special assessments owing to the condo corporation. Arrears affect net proceeds and can be a title lien.", "<span class='tag-dd'>[DUE DILIGENCE]</span> <strong>Maintenance Fee:</strong> Verify the exact monthly maintenance fee and what it includes (Heat, Water, Building Insurance, etc.).", "<span class='tag-dd'>[DUE DILIGENCE]</span> <strong>Lawyer:</strong> Advise the seller to retain a real estate lawyer early to handle title transfer, mortgage discharge, and statement of adjustments."] }] },
                    { id: "lc_pre_email", title: "2. Advance Email & RECO Delivery", badge: "Procedure & Script", color: "bg-blue-50 text-blue-700 border border-blue-200", icon: "mail", description: "Send 24‑48 hours before your meeting.", sections: [{ title: "Email Template", steps: ["<span class='tag-mandatory'>[MANDATORY]</span> You must provide the RECO Guide before providing services.", "<div class='bg-slate-50 border border-slate-200 p-4 rounded-lg mt-2 text-sm text-slate-700 italic border-l-4 border-l-emerald-500 shadow-sm'><strong>Subject:</strong> Looking forward to our condo listing meeting + Important Info<br><br>Hi [Client Name],<br><br>I am looking forward to our meeting. Because the province updated the rules for real estate representation, I am required by law to provide you with the attached RECO Information Guide before we officially begin. Please give it a quick read-through.<br><br>Also, if you have a current Status Certificate, please have it ready for our meeting.<br><br>Best,<br>Ken Morgan</div>"] }] }
                ]
            },
            {
                phase: "Phase 2: The Kitchen Table (Condo Contracts)",
                description: "Secure wet-ink signatures. Condos have additional considerations.",
                items: [
                    { id: "lc_reco", title: "3. RECO Sign-off & Agenda", badge: "Dialogue", color: "bg-indigo-50 text-indigo-700 border border-indigo-200", icon: "message-circle", description: "TRESA acknowledgment and condo-specific agenda.", sections: [{ title: "Script & Sign-off", steps: ["<span class='tag-script'>[SCRIPT]</span> <em>\"Did you have a chance to glance at the RECO guide? It confirms that I am acting as your Designated Representative. For your condo specifically, we'll need to discuss the Status Certificate, maintenance fees, and condo corporation rules.\"</em>", "<span class='tag-mandatory'>[MANDATORY]</span> Have all Sellers sign and date the printed Page 13 Acknowledgement."] }] },
                    { id: "lc_form271", title: "4. Form 271 — Listing Agreement (Condo)", badge: "Paper Contract", color: "bg-amber-50 text-amber-700 border border-amber-200", icon: "file-signature", description: "The core legal contract — condo specifics matter.", sections: [{ title: "Condo-Specific Form Breakdown", steps: ["<span class='tag-mandatory'>[MANDATORY]</span> <strong>Designated Rep:</strong> Your exact name.", "<span class='tag-mandatory'>[MANDATORY]</span> <strong>Legal Description:</strong> Must include Condominium Plan No. and Unit No. exactly as per Registry.", "<span class='tag-mandatory'>[MANDATORY]</span> <strong>Dates:</strong> Commencing and Expiring times.", "<span class='tag-mandatory'>[MANDATORY]</span> <strong>Commission:</strong> Total %, Co‑op %, and Holdover days.", "<span class='tag-ask'>[ASK SELLER]</span> <strong>HST on Commission:</strong> Confirm that HST is charged on top of the agreed commission. Clarify whether the stated commission includes or excludes HST.", "<span class='tag-mandatory'>[MANDATORY]</span> <strong>Schedule A:</strong> Attach Casora's Schedule A. Consider adding a clause about Status Certificate availability.", "<span class='tag-dd'>[DUE DILIGENCE]</span> <span class='tag-ask'>[ASK SELLER]</span> <strong>Spousal Consent:</strong> Is it a matrimonial home? Non-titled spouse must sign Page 4."] }] },
                    { id: "lc_fintrac", title: "5. FINTRAC ID Records", badge: "Paper Form", color: "bg-amber-50 text-amber-700 border border-amber-200", icon: "fingerprint", description: "Federal anti-money laundering verification.", sections: [{ title: "Verification", steps: ["<span class='tag-mandatory'>[MANDATORY]</span> Check Driver's License or Passport. Copy ID Number and Expiry exactly.", "<span class='tag-ask'>[ASK SELLER]</span> Ask for their Principal Business/Occupation.", "<span class='tag-mandatory'>[MANDATORY]</span> Section D (Purpose): Check 'Residential Property' and 'Sale'.", "<span class='tag-mandatory'>[MANDATORY]</span> Determine if the client is a Politically Exposed Person (PEP), Head of an International Organization (HIO), or appears on any sanctions list (OFAC, OSFI). This is required under FINTRAC regulations."] }] },
                    { id: "lc_form244", title: "6. Form 244 & Lockbox Direction", badge: "Paper Contract", color: "bg-amber-50 text-amber-700 border border-amber-200", icon: "lock", description: "Offer strategy and access — condos may have concierge or fob restrictions.", sections: [{ title: "Form 244 & Lockbox", steps: ["<span class='tag-ask'>[ASK SELLER]</span> <strong>Holding Offers:</strong> If holding, enter Date/Time and check YES or NO for Pre-emptive offers.", "<span class='tag-mandatory'>[MANDATORY]</span> <strong>Lockbox:</strong> Get signature authorizing the lockbox. Note any condo building restrictions on lockbox placement.", "<span class='tag-optional'>[OPTIONAL]</span> Check if the condo has a concierge — you may need to coordinate showing instructions differently."] }] },
                    { id: "lc_form161", title: "7. OREA Form 161 (Disclosure)", badge: "Conditional Form", color: "bg-red-50 text-red-700 border border-red-200", icon: "alert-triangle", description: "ONLY if you or Casora! have an interest in the property.", sections: [{ title: "When & How to use", steps: ["<span class='tag-mandatory'>[MANDATORY]</span> If YOU or the brokerage own the condo, you must declare it using this form."] }] }
                ]
            },
            {
                phase: "Phase 3: Condo MLS Data Entry",
                description: "Using the specific condo listing form.",
                items: [
                    { id: "lc_mls", title: "8. PropTx 291 & BrokerBay (Condo)", badge: "Digital Entry", color: "bg-cyan-50 text-cyan-700 border border-cyan-200", icon: "building", description: "Condo-specific MLS data and showing instructions.", sections: [{ title: "Condo MLS Setup", steps: ["<span class='tag-mandatory'>[MANDATORY]</span> Use PropTx 291 (Condo Sale) — NOT Form 290.", "<span class='tag-mandatory'>[MANDATORY]</span> Must list: Condo Corp Name, Condo Plan No., Maintenance Fee amount, and what is included (Heat, Water, Building Insurance, etc.).", "<span class='tag-mandatory'>[MANDATORY]</span> Specify Parking Type: 'Owned' vs 'Exclusive Use', with Level and Number.", "<span class='tag-mandatory'>[MANDATORY]</span> Specify Locker Type: 'Owned' vs 'Exclusive Use', with Level and Number.", "<span class='tag-mandatory'>[MANDATORY]</span> Set up BrokerBay contacts and offer email. Send to Seller via DocuSign for approval."] }] }
                ]
            },
            {
                phase: "Phase 4: Condo Deal Completion",
                description: "Processing the firm deal — Status Certificate is key.",
                items: [
                    { id: "lc_dealsummary", title: "9. CASORA Deal Summary (Condo)", badge: "Internal Form", color: "bg-purple-50 text-purple-700 border border-purple-200", icon: "briefcase", description: "Submitted when the condo deal goes FIRM (after Status Certificate condition resolved).", sections: [{ title: "Financials & Submission", steps: ["<span class='tag-mandatory'>[MANDATORY]</span> Enter the exact Deposit held by Casora.", "<span class='tag-mandatory'>[MANDATORY]</span> Break down commission due to Casora and the Co‑op Brokerage.", "<span class='tag-mandatory'>[MANDATORY]</span> Ensure the Status Certificate condition has been <strong>satisfied</strong> (Form 124 – Notice of Fulfillment, lawyer approved) OR <strong>waived</strong> (Form 123 – Waiver, buyer proceeds without review). Use the correct form.", "<span class='tag-mandatory'>[MANDATORY]</span> Submit with Firm APS, Form 271, FINTRAC, RECO Ack, Form 244, the appropriate waiver/fulfillment form, and any other waivers."] }] }
                ]
            }
        ];

        const listLeaseData = [
            {
                phase: "Phase 1: Landlord Agency Setup",
                description: "Representing a Landlord — TRESA applies to leases too.",
                items: [
                    { id: "ll_due_diligence", title: "1. Landlord Due Diligence", badge: "Office Research", color: "bg-teal-50 text-teal-700 border border-teal-200", icon: "search", description: "Verify the Landlord's legal standing and advise on obligations.", sections: [{ title: "Verification & Advisory", steps: ["<span class='tag-dd'>[DUE DILIGENCE]</span> <strong>GeoWarehouse:</strong> Verify Landlord's name matches title exactly.", "<span class='tag-dd'>[DUE DILIGENCE]</span> <strong>Rental Legality:</strong> Confirm the property is zoned for rental and there are no condo bylaw restrictions on leasing.", "<span class='tag-dd'>[DUE DILIGENCE]</span> <strong>Existing Lease & Termination:</strong> If currently tenanted, know the correct notice: <strong>N11</strong> (mutual agreement to end tenancy – both parties must genuinely agree), <strong>N12</strong> (landlord's own use – requires good faith intent to occupy by landlord or close family member, 60 days notice, and one month's compensation to tenant), <strong>N13</strong> (demolition, repair, or conversion – also requires compensation).", "<span class='tag-dd'>[DUE DILIGENCE]</span> <strong>Insurance:</strong> Advise the landlord to obtain landlord-specific insurance; standard homeowner's insurance may be void once the property is tenanted.", "<span class='tag-dd'>[DUE DILIGENCE]</span> <strong>Rent Control:</strong> If the property was first occupied for residential purposes after November 15, 2018, it is exempt from the Rent Increase Guideline. Otherwise, annual increases are capped by the provincial RIG. This affects pricing strategy for new tenants."] }] },
                    { id: "ll_reco_email", title: "2. RECO Guide Delivery", badge: "Compliance", color: "bg-blue-50 text-blue-700 border border-blue-200", icon: "mail", description: "TRESA compliance before providing services.", sections: [{ title: "Delivery", steps: ["<span class='tag-mandatory'>[MANDATORY]</span> Email RECO Guide to Landlord 24‑48 hours before meeting.", "<span class='tag-mandatory'>[MANDATORY]</span> At meeting: Have Landlord sign Page 13 Acknowledgement.", "<span class='tag-script'>[SCRIPT]</span> <em>\"TRESA requires me to explain that as your Designated Representative, my sole loyalty is to you, the Landlord.\"</em>"] }] }
                ]
            },
            {
                phase: "Phase 2: Landlord Contracts",
                description: "Securing the Landlord representation agreement.",
                items: [
                    { id: "ll_form272", title: "3. Form 272 — Landlord Representation", badge: "Core Contract", color: "bg-amber-50 text-amber-700 border border-amber-200", icon: "file-signature", description: "Authority to offer for LEASE — this is the listing agreement for rentals.", sections: [{ title: "Key Fields", steps: ["<span class='tag-mandatory'>[MANDATORY]</span> <strong>Designated Representative:</strong> Your exact name.", "<span class='tag-mandatory'>[MANDATORY]</span> <strong>Commission:</strong> Usually stated as 'One month's rent' or 'One half of one month's rent' depending on agreement. Clarify who pays (typically Landlord).", "<span class='tag-mandatory'>[MANDATORY]</span> <strong>Term:</strong> Commencing and Expiring dates of the listing.", "<span class='tag-ask'>[ASK LANDLORD]</span> <strong>Rent Amount:</strong> Confirm the asking rent. Discuss market comparables."] }] },
                    { id: "ll_fintrac", title: "4. FINTRAC ID Verification", badge: "Compliance", color: "bg-amber-50 text-amber-700 border border-amber-200", icon: "fingerprint", description: "Anti-money laundering — applies to lease transactions too.", sections: [{ title: "Verification", steps: ["<span class='tag-mandatory'>[MANDATORY]</span> Verify Landlord's physical ID (Driver's License or Passport).", "<span class='tag-mandatory'>[MANDATORY]</span> Section D: Check 'Residential Property' and Purpose: 'Lease/Rent'.", "<span class='tag-mandatory'>[MANDATORY]</span> Determine if the client is a Politically Exposed Person (PEP), Head of an International Organization (HIO), or appears on any sanctions list (OFAC, OSFI). This is required under FINTRAC regulations."] }] }
                ]
            },
            {
                phase: "Phase 3: Lease MLS & Marketing",

            const currentData = currentTrack.data;

            // Calculations
            const totalItems = currentData.reduce((acc, phase) => acc + phase.items.length, 0);
            const currentTrackIds = currentData.flatMap(p => p.items.map(i => i.id));
            const completedCount = activeClient ? currentTrackIds.filter(id => activeClient.completedItems[id]).length : 0;
            const progressPercentage = totalItems === 0 ? 0 : (completedCount / totalItems) * 100;

            // Actions
            const handleAddClient = (e) => {
                e.preventDefault();
                if (!newClientName) return;
                const newClient = {
                    id: Date.now().toString(),
                    name: newClientName,
                    property: newClientProp,
                    track: newClientTrack,
                    completedItems: {},
                    expandedNodes: {}
                };
                setClients(prev => [...prev, newClient]);
                setActiveClientId(newClient.id);
                setShowAddModal(false);
                setNewClientName('');
                setNewClientProp('');
            };

            const toggleAccordion = (id) => {
                if (!activeClient) return;
                setClients(prev => prev.map(c => {
                    if (c.id === activeClientId) {
                        return { ...c, expandedNodes: { ...c.expandedNodes, [id]: !c.expandedNodes[id] } };
                    }
                    return c;
                }));
            };

            const toggleCompletion = (id) => {
                if (!activeClient) return;
                setClients(prev => prev.map(c => {
                    if (c.id === activeClientId) {
                        return { ...c, completedItems: { ...c.completedItems, [id]: !c.completedItems[id] } };
                    }
                    return c;
                }));
            };

            const deleteClient = (id, e) => {
                e.stopPropagation();
                if(confirm("Delete this client entirely?")) {
                    setClients(prev => prev.filter(c => c.id !== id));
                    if(activeClientId === id) setActiveClientId(null);
                }
            };

            // JSON Export/Import
            const handleExport = () => {
                const dataStr = JSON.stringify(clients, null, 2);
                const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(dataStr);
                const exportFileDefaultName = `Casora_FormsGuide_Master_${new Date().toISOString().split('T')[0]}.json`;
                
                const linkElement = document.createElement('a');
                linkElement.setAttribute('href', dataUri);
                linkElement.setAttribute('download', exportFileDefaultName);
                linkElement.click();
            };

            const handleImport = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const importedData = JSON.parse(event.target.result);
                        if(Array.isArray(importedData)) {
                            setClients(importedData);
                            if(importedData.length > 0) setActiveClientId(importedData[0].id);
                            alert("Database restored successfully.");
                        } else {
                            alert("Invalid JSON format.");
                        }
                    } catch (err) {
                        alert("Error reading JSON file.");
                    }
                };
                reader.readAsText(file);
            };

            // String replacement for dynamic context
            const parseStepText = (htmlString) => {
                let parsed = htmlString;
                if (activeClient) {
                    parsed = parsed.replace(/\[Client Name\]/g, activeClient.name);
                }
                return { __html: parsed };
            };

            return (
                <div className="flex h-screen w-full font-sans overflow-hidden bg-slate-50">
                    
                    {/* LEFT SIDEBAR */}
                    <aside className="w-80 bg-[#0B172A] flex flex-col z-20 shadow-2xl relative shrink-0 no-print">
                        <div className="p-6 border-b border-white/10 flex flex-col items-center pt-8">
                            <div className="bg-white rounded-2xl p-4 shadow-xl w-full flex justify-center mb-6">
                                <img src="https://github.com/KenMorganRealEstate/Home/blob/main/CASORA%20PRIMARY%20LOGO_blue.png?raw=true" alt="Casora Logo" className="h-10 object-contain" />
                            </div>
                            <div className="text-center">
                                <h2 className="text-sm font-bold text-white tracking-wider">FORMS GUIDE</h2>
                                <p className="text-[10px] uppercase tracking-widest text-blue-300 mt-1">Client Portfolio</p>
                            </div>
                        </div>

                        {/* Client List */}
                        <div className="flex-1 overflow-y-auto p-4 custom-scrollbar">
                            <button onClick={() => setShowAddModal(true)} className="w-full flex justify-center items-center space-x-2 bg-blue-600 hover:bg-blue-500 text-white py-2.5 rounded-lg text-sm font-bold shadow-lg transition mb-6">
                                <i data-lucide="plus" className="w-4 h-4"></i> <span>Add New Client</span>
                            </button>

                            <div className="space-y-2">
                                {clients.length === 0 && <p className="text-slate-500 text-sm text-center italic mt-10">No active clients. Add one to begin.</p>}
                                {clients.map(c => {
                                    const isActive = c.id === activeClientId;
                                    const trackMeta = trackDefinitions[c.track];
                                    return (
                                        <div key={c.id} onClick={() => setActiveClientId(c.id)} className={`group relative p-3 rounded-xl cursor-pointer transition-all border ${isActive ? 'bg-slate-800 border-blue-500 shadow-md' : 'border-transparent hover:bg-white/5'}`}>
                                            <div className="flex justify-between items-start">
                                                <div>
                                                    <h4 className={`font-bold ${isActive ? 'text-white' : 'text-slate-300'}`}>{c.name}</h4>
                                                    <p className="text-xs text-slate-500 mt-0.5 flex items-center gap-1.5"><i data-lucide={trackMeta.icon} className="w-3 h-3"></i> {trackMeta.title}</p>
                                                </div>
                                                <button onClick={(e) => deleteClient(c.id, e)} className="text-slate-600 hover:text-red-400 opacity-0 group-hover:opacity-100 transition"><i data-lucide="trash-2" className="w-4 h-4"></i></button>
                                            </div>
                                        </div>
                                    )
                                })}
                            </div>
                        </div>
                        
                        {/* Data Management Area */}
                        <div className="p-4 border-t border-white/10 bg-black/20 grid grid-cols-2 gap-2">
                            <label className="flex items-center justify-center space-x-2 py-2 px-3 bg-slate-800 hover:bg-slate-700 text-slate-300 text-xs font-bold rounded cursor-pointer transition">
                                <i data-lucide="upload" className="w-3.5 h-3.5"></i> <span>Import</span>
                                <input type="file" accept=".json" className="hidden" onChange={handleImport} />
                            </label>
                            <button onClick={handleExport} className="flex items-center justify-center space-x-2 py-2 px-3 bg-slate-800 hover:bg-slate-700 text-slate-300 text-xs font-bold rounded transition">
                                <i data-lucide="download" className="w-3.5 h-3.5"></i> <span>Export</span>
                            </button>
                        </div>

                        {/* Copyright / Ego Boost Section */}
                        <div className="p-4 border-t border-white/10 text-center space-y-1 mt-auto bg-[#081120]">
                            <p className="text-[10px] text-slate-400 uppercase tracking-widest font-semibold">Concept & Design by Ken Morgan</p>
                            <p className="text-[10px] text-slate-500">&copy; 2026 Ken Morgan Your Tech-Forward Realtor</p>
                        </div>
                    </aside>

                    {/* MAIN CONTENT AREA */}
                    <main className="flex-1 flex flex-col relative overflow-hidden bg-white print:bg-white print:w-full">
                        
                        {!activeClient ? (
                            <div className="flex-1 flex flex-col items-center justify-center bg-slate-50 text-slate-400 no-print">
                                <i data-lucide="folder-open" className="w-16 h-16 mb-4 text-slate-300"></i>
                                <h2 className="text-xl font-bold text-slate-600">No Client Selected</h2>
                                <p className="mt-2 text-sm">Select a client from the sidebar or add a new one.</p>
                            </div>
                        ) : (
                            <>
                                {/* Top Header */}
                                <header className="bg-white sticky top-0 z-10 px-8 py-5 flex justify-between items-center border-b border-slate-200 shadow-sm no-print">
                                    <div>
                                        <div className="flex items-center gap-3 mb-1">
                                            <span className="px-2.5 py-1 bg-slate-100 text-slate-600 text-[10px] font-bold uppercase tracking-widest rounded-md border border-slate-200 flex items-center gap-1.5"><i data-lucide={currentTrack.icon} className="w-3 h-3"></i> {currentTrack.title}</span>
                                        </div>
                                        <h1 className="text-3xl font-extrabold text-slate-900 tracking-tight">{activeClient.name}</h1>
                                        {activeClient.property && <p className="text-sm text-slate-500 font-medium">{activeClient.property}</p>}
                                    </div>

                                    {/* Progress & Ken Morgan Logo */}
                                    <div className="flex items-center space-x-6 bg-slate-50 p-3 rounded-2xl border border-slate-100">
                                        <div className="text-right pr-6 border-r border-slate-200">
                                            <div className="flex items-end justify-end space-x-2 mb-1.5">
                                                <span className="text-2xl font-black text-blue-700 leading-none">{Math.round(progressPercentage)}%</span>
                                                <span className="text-slate-400 text-xs font-bold uppercase tracking-wider mb-0.5">({completedCount}/{totalItems})</span>
                                            </div>
                                            <div className="w-32 h-2 bg-slate-200 rounded-full overflow-hidden">
                                                <div className="h-full bg-blue-600 rounded-full transition-all duration-500" style={{ width: `${progressPercentage}%` }}></div>
                                            </div>
                                        </div>
                                        <button onClick={() => window.print()} className="p-2 text-slate-400 hover:text-blue-600 hover:bg-blue-50 rounded-lg transition" title="Print Checklist">
                                            <i data-lucide="printer" className="w-6 h-6"></i>
                                        </button>
                                        <img src="https://github.com/KenMorganRealEstate/Home/blob/main/KenMorganLogoBestOneTransparent.png?raw=true" alt="Ken Morgan Logo" className="h-14 object-contain" />
                                    </div>
                                </header>

                                {/* Print Header (Only visible when printing) */}
                                <div className="hidden print:flex justify-between items-end mb-8 border-b-2 border-slate-800 pb-4">
                                    <div>
                                        <h1 className="text-3xl font-black text-slate-900">Casora! Forms Guide</h1>
                                        <h2 className="text-xl font-bold text-slate-700 mt-2">Client: {activeClient.name} {activeClient.property ? `— ${activeClient.property}` : ''}</h2>
                                        <p className="text-sm text-slate-500 mt-1">Track: {currentTrack.title} | Status: {Math.round(progressPercentage)}% Complete</p>
                                    </div>
                                    <img src="https://github.com/KenMorganRealEstate/Home/blob/main/KenMorganLogoBestOneTransparent.png?raw=true" alt="Ken Morgan Logo" className="h-16 object-contain" />
                                </div>

                                {/* Flowchart Content */}
                                <div className="flex-1 overflow-y-auto px-6 py-8 lg:p-12 custom-scrollbar bg-slate-50/50 print:bg-white print:p-0">
                                    <div className="max-w-4xl mx-auto relative">
                                        <div className="timeline-line hidden sm:block no-print"></div>

                                        <div className="space-y-10 pb-16 print:space-y-6 print:pb-0">
                                            {currentData.map((phaseData, phaseIdx) => (
                                                <div key={phaseIdx} className="relative z-10 print-break-inside-avoid print:mb-8">
                                                    
                                                    {/* Phase Header */}
                                                    <div className="flex items-center mb-6 relative">
                                                        <div className="hidden sm:flex absolute left-5 -translate-x-1/2 w-5 h-5 rounded-full bg-white border-[3px] border-slate-300 z-10 no-print"></div>
                                                        <div className="sm:ml-12 bg-white border border-slate-200 px-6 py-4 rounded-xl shadow-sm w-full relative print:shadow-none print:border-slate-400">
                                                            <div className={`absolute top-0 left-0 w-1 h-full bg-${currentTrack.color}-500 no-print`}></div>
                                                            <h3 className={`text-sm font-bold text-${currentTrack.color}-700 uppercase tracking-widest print:text-slate-900 print:text-lg`}>{phaseData.phase}</h3>
                                                            <p className="text-slate-600 text-sm mt-1">{phaseData.description}</p>
                                                        </div>
                                                    </div>

                                                    {/* Items */}
                                                    <div className="space-y-4 sm:ml-12 print:ml-4">
                                                        {phaseData.items.map((item) => {
                                                            const isExpanded = activeClient.expandedNodes[item.id] || false;
                                                            const isCompleted = activeClient.completedItems[item.id] || false;
                                                            
                                                            return (
                                                                <div key={item.id} className="relative group/task print-break-inside-avoid">
                                                                    <div className="hidden sm:block absolute left-[-2rem] top-1/2 w-8 h-[2px] bg-slate-200 no-print"></div>
                                                                    <div className={`hidden sm:block absolute left-[-2rem] top-1/2 -translate-x-1/2 -translate-y-1/2 w-3.5 h-3.5 rounded-full border-2 z-10 no-print ${isCompleted ? `bg-blue-500 border-white` : 'bg-white border-slate-300'}`}></div>

                                                                    <div className={`bg-white rounded-xl border print:border-b print:border-t-0 print:border-x-0 print:rounded-none print:shadow-none ${isCompleted ? `border-blue-200 shadow-sm no-print` : 'border-slate-200 shadow-sm no-print'}`}>
                                                                        
                                                                        <div className="p-4 flex items-center justify-between cursor-pointer print:cursor-default" onClick={() => toggleAccordion(item.id)}>
                                                                            <div className="flex items-center space-x-4 flex-1">
                                                                                <div className={`p-2 rounded-lg no-print ${isCompleted ? `bg-blue-50 text-blue-600` : 'bg-slate-100 text-slate-500'}`}>
                                                                                    <i data-lucide={item.icon} className="w-5 h-5"></i>
                                                                                </div>
                                                                                {/* Print Checkbox */}
                                                                                <div className="hidden print:block w-5 h-5 border-2 border-slate-400 rounded mr-2 flex-shrink-0">
                                                                                    {isCompleted && <div className="w-full h-full text-black text-center leading-4 font-bold">✓</div>}
                                                                                </div>
                                                                                <div>
                                                                                    <div className="flex flex-wrap items-center gap-2 mb-1">
                                                                                        <h4 className={`text-base font-bold ${isCompleted ? 'text-slate-400 line-through print:no-underline print:text-slate-900' : 'text-slate-800'}`}>{item.title}</h4>
                                                                                        <span className={`px-2 py-0.5 rounded-full text-[9px] font-bold uppercase tracking-wider border ${item.color}`}>{item.badge}</span>
                                                                                    </div>
                                                                                    <p className="text-slate-500 text-sm print:text-xs">{item.description}</p>
                                                                                </div>
                                                                            </div>
                                                                            
                                                                            <div className="flex items-center space-x-4 ml-4 no-print">
                                                                                <ToggleSwitch checked={!!isCompleted} onChange={() => toggleCompletion(item.id)} />
                                                                                <i data-lucide="chevron-down" className={`w-5 h-5 text-slate-400 transition-transform ${isExpanded ? 'rotate-180 text-blue-600' : ''}`}></i>
                                                                            </div>
                                                                        </div>

                                                                        {/* Accordion Content (Always open in print via CSS) */}
                                                                        <div className={`accordion-content ${isExpanded ? 'open' : 'closed'} print:open`}>
                                                                            <div className="px-5 pb-5 pt-3 border-t border-slate-100 bg-slate-50/50 rounded-b-xl print:p-2 print:border-none print:bg-white">
                                                                                <div className="space-y-4">
                                                                                    {item.sections.map((section, sIdx) => (
                                                                                        <div key={sIdx} className="bg-white border border-slate-200 p-4 rounded-lg shadow-sm print:shadow-none print:border-dashed">
                                                                                            <h5 className="font-bold text-slate-800 mb-3 text-xs uppercase tracking-wider">{section.title}</h5>
                                                                                            <ul className="space-y-3">
                                                                                                {section.steps.map((step, idx) => (
                                                                                                    <li key={idx} className="flex items-start text-slate-600 text-sm leading-relaxed print:text-xs">
                                                                                                        <div className="mt-1.5 mr-3 w-1.5 h-1.5 rounded-full bg-slate-400 flex-shrink-0 print:hidden"></div>
                                                                                                        <span dangerouslySetInnerHTML={parseStepText(step)}></span>
                                                                                                    </li>
                                                                                                ))}
                                                                                            </ul>
                                                                                        </div>
                                                                                    ))}
                                                                                </div>
                                                                            </div>
                                                                        </div>
                                                                    </div>
                                                                </div>
                                                            );
                                                        })}
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                    
                                    {/* Print Footer */}
                                    <div className="hidden print:block text-center pt-8 border-t border-slate-300 mt-8">
                                        <p className="text-xs text-slate-500 font-bold uppercase tracking-widest">Concept & Design by Ken Morgan</p>
                                        <p className="text-xs text-slate-400">&copy; 2026 Ken Morgan - Your Tech-Forward Realtor. All rights reserved.</p>
                                    </div>
                                </div>
                            </>
                        )}
                    </main>

                    {/* ADD CLIENT MODAL */}
                    {showAddModal && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 no-print">
                            <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden">
                                <div className="bg-slate-50 p-5 border-b border-slate-200 flex justify-between items-center">
                                    <h3 className="font-bold text-lg text-slate-800">Add New Client</h3>
                                    <button onClick={() => setShowAddModal(false)} className="text-slate-400 hover:text-slate-700"><i data-lucide="x" className="w-5 h-5"></i></button>
                                </div>
                                <form onSubmit={handleAddClient} className="p-6 space-y-4">
                                    <div>
                                        <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Client Name *</label>
                                        <input type="text" required value={newClientName} onChange={e => setNewClientName(e.target.value)} placeholder="e.g. Smith Family" className="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" />
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Property Info (Optional)</label>
                                        <input type="text" value={newClientProp} onChange={e => setNewClientProp(e.target.value)} placeholder="e.g. 123 Main St" className="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" />
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Workflow Track</label>
                                        <select value={newClientTrack} onChange={e => setNewClientTrack(e.target.value)} className="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none font-medium text-slate-700">
                                            {Object.entries(trackDefinitions).map(([key, def]) => (
                                                <option key={key} value={key}>{def.title}</option>
                                            ))}
                                        </select>
                                    </div>
                                    <div className="pt-4">
                                        <button type="submit" className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition">Create Workflow</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
