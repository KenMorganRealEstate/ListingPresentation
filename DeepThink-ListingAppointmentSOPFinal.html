            margin: 0;
            overflow-x: hidden;
        }
        .flow-line::before {
            content: '';
            position: absolute;
            left: 24px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: linear-gradient(to bottom, var(--brand-accent), var(--brand-cyan));
            opacity: 0.3;
            z-index: 0;
        }
        .flow-node {
            position: relative;
            z-index: 1;
        }
        .flow-node::after {
            content: '';
            position: absolute;
            left: 20px;
            top: 28px;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--brand-accent);
            box-shadow: 0 0 12px rgba(46,122,255,0.6);

        }

        }
        .accordion-content {
            transition: max-height 0.4s ease-in-out, opacity 0.4s ease-in-out;
            overflow: hidden;
        }
        .accordion-content.open {
            max-height: 6000px;
            opacity: 1;
        }
        .accordion-content.closed {
            max-height: 0;
            opacity: 0;
        }
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0A101F;
        }
        ::-webkit-scrollbar-thumb {
            background: #2a3a55;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #3b4a6b;
        }
        .toggle-switch {
            width: 40px;
            height: 20px;
            background: #374151;
            border-radius: 9999px;
            position: relative;
            cursor: pointer;
            transition: background 0.3s;
        }
        .toggle-switch.active {
            background: var(--brand-accent);
            box-shadow: 0 0 10px var(--brand-accent);
        }
        .toggle-switch::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 16px;
            height: 16px;
            background: white;
            border-radius: 50%;
            transition: transform 0.3s;
        }
        .toggle-switch.active::after {
            transform: translateX(20px);
        }
        .tag-mandatory {

            color: #fecaca;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 700;
            margin-right: 6px;

            font-weight: 700;
            margin-right: 6px;

                color: "bg-orange-500/20 text-orange-300",
                icon: "file-search",
                description: "Preparing a strong lease package.",
                sections: [{
                    title: "The Rental Package",
                    steps: [
                        "<span class='tag-dd'>[DUE DILIGENCE]</span> Ensure you have the Tenant's Credit Report (Equifax/TransUnion), Employment Letter, Pay Stubs, and References ready to submit alongside the offer.",
                        "<span class='tag-ask'>[ASK TENANT]</span> <em>\"Do you have a current credit report? Landlords will expect one.\"</em>",
                        "<span class='tag-mandatory'>[MANDATORY]</span> A strong package includes: Credit Report + Employment Letter + 2 Recent Pay Stubs + References from previous landlords."
                    ]
                }]
            }, {
                id: "t_form400",
                title: "5. Form 400 — Agreement to Lease",
                badge: "Lease Offer",
                color: "bg-blue-500/20 text-blue-300",
                icon: "file-text",
                description: "The initial offer to rent the property.",
                sections: [{
                    title: "Page 1: Terms",
                    steps: [
                        "<span class='tag-mandatory'>[MANDATORY]</span> <strong>Term of Lease:</strong> State duration (e.g., 1 Year) and exact Commencing Date.",
                        "<span class='tag-mandatory'>[MANDATORY]</span> <strong>Rent:</strong> State the monthly rent amount.",
                        "<span class='tag-mandatory'>[MANDATORY]</span> <strong>Deposit:</strong> The landlord may collect a maximum of <strong>last month's rent</strong> as a deposit. The first month's rent is simply the first rent payment, not a deposit. Security deposits, damage deposits, and key deposits are illegal. Ensure the deposit is for last month only, payable to the Listing Brokerage Trust Account."
                    ]
                }, {
                    title: "Pages 2 & 3: Clauses",
                    steps: [
                        "<span class='tag-mandatory'>[MANDATORY]</span> <strong>Post-Dated Cheques:</strong> Indicate how rent will be paid (e.g., 10 post-dated cheques, e-transfer).",
                        "<span class='tag-mandatory'>[MANDATORY]</span> <strong>Services & Costs:</strong> Clearly define who pays Gas, Oil, Electricity, Water, etc."
                    ]
                }]
            }, {
                id: "t_form160",
                title: "6. OREA Form 160 (Disclosure)",
                badge: "Conditional Form",
                color: "bg-red-500/20 text-red-300",
                icon: "alert-triangle",
                description: "ONLY if you/family are the Tenant.",
                sections: [{
                    title: "Usage",
                    steps: [
                        "<span class='tag-mandatory'>[MANDATORY]</span> Must declare if you are leasing the property."
                    ]
                }]
            }]
        }, {
            phase: "Phase 3: Firm Lease & Standard Agreement",
            description: "Signing the mandatory provincial lease and getting paid.",
            items: [{
                id: "t_form320",
                title: "7. Form 320 — Confirmation of Co‑operation",
                badge: "Mandatory Paperwork",
                color: "bg-emerald-500/20 text-emerald-300",
                icon: "handshake",
                description: "Commission details.",
                sections: [{
                    title: "Representation & Commission",
                    steps: [
                        "<span class='tag-mandatory'>[MANDATORY]</span> Section 2: Check 'Represents the Interests of the Buyer/Tenant'. Section 3: Fill Co‑op Commission (usually 1/2 month's rent)."
                    ]
                }]
            }, {
                id: "t_ontario_lease",
                title: "8. Ontario Residential Tenancy Agreement",
                badge: "Provincial Law",
                color: "bg-emerald-500/20 text-emerald-300",
                icon: "gavel",
                description: "The 'Standard Lease'. Mandatory in Ontario.",
                sections: [{
                    title: "Execution",
                    steps: [
                        "<span class='tag-mandatory'>[MANDATORY]</span> Once Form 400 is accepted, the Landlord MUST provide this Standard Lease to the Tenant. Most sections are mandatory, but additional terms can be added in Schedule A as long as they don't conflict with the Residential Tenancies Act.",
                        "<span class='tag-mandatory'>[MANDATORY]</span> Ensure Landlord Name, Tenant Name, Unit Address, and Rent match Form 400 perfectly.",
                        "<span class='tag-mandatory'>[MANDATORY]</span> Under the RTA, if the tenant requests the signed Standard Lease in writing and the landlord fails to provide it within 21 days, the tenant may withhold one month's rent. Inform your tenant-client of this right.",
                        "<span class='tag-optional'>[OPTIONAL]</span> Attach Schedule A from your Form 400 to the 'Additional Terms' section of this Standard Lease."
                    ]
                }]
            }, {
                id: "t_dealsummary",
                title: "9. CASORA Deal Summary",
                badge: "Internal Admin",
                color: "bg-purple-500/20 text-purple-300",
                icon: "briefcase",
                description: "Getting paid for the lease.",
                sections: [{
                    title: "Office Submission",
                    steps: [
                        "<span class='tag-mandatory'>[MANDATORY]</span> Type of Transaction: Check <strong>LEASE</strong>.",
                        "<span class='tag-mandatory'>[MANDATORY]</span> Casora Role: Check <strong>SELLING</strong>.",
                        "<span class='tag-mandatory'>[MANDATORY]</span> Submit with Firm Form 400, Form 320, FINTRAC, Form 372, RECO Ack, and the signed Ontario Standard Lease."
                    ]
                }]
            }]
        }];

        // ============================================================
        // MAIN APP COMPONENT
        // ============================================================
        const App = () => {
            const [activeTrack, setActiveTrack] = useState('list_freehold');
            const [openAccordion, setOpenAccordion] = useState(null);
            const [completedItems, setCompletedItems] = useState({});

            const getData = (track) => {
                switch(track) {
                    case 'list_freehold': return listFreeholdData;
                    case 'list_condo': return listCondoData;
                    case 'list_lease': return listLeaseData;
                    case 'buy_freehold': return buyFreeholdData;
                    case 'buy_condo': return buyCondoData;
                    case 'rep_tenant': return repTenantData;
                    default: return listFreeholdData;
                }
            };

            const currentData = getData(activeTrack);
            const theme = {
                list_freehold: { accent: '#10b981', gradient: 'from-emerald-400 to-cyan-500' },
                list_condo: { accent: '#14b8a6', gradient: 'from-teal-400 to-emerald-500' },
                list_lease: { accent: '#06b6d4', gradient: 'from-cyan-400 to-blue-500' },
                buy_freehold: { accent: '#3b82f6', gradient: 'from-blue-400 to-indigo-500' },
                buy_condo: { accent: '#6366f1', gradient: 'from-violet-400 to-purple-500' },
                rep_tenant: { accent: '#8b5cf6', gradient: 'from-purple-400 to-pink-500' },
            };
            const activeTheme = theme[activeTrack];

            const toggleAccordion = (id) => setOpenAccordion(openAccordion === id ? null : id);
            const toggleCompletion = (id, e) => {
                e && e.stopPropagation();
                setCompletedItems(prev => ({ ...prev, [id]: !prev[id] }));
            };

            const totalItems = currentData.reduce((acc, phase) => acc + phase.items.length, 0);
            const currentTrackIds = currentData.flatMap(phase => phase.items.map(item => item.id));
            const completedCount = currentTrackIds.filter(id => completedItems[id]).length;
            const progressPercentage = totalItems === 0 ? 0 : (completedCount / totalItems) * 100;

            useEffect(() => { setOpenAccordion(null); }, [activeTrack]);
            useEffect(() => { lucide.createIcons(); });

            return (
                <div className="min-h-screen text-slate-200 flex flex-col" style={{ background: 'radial-gradient(circle at 10% 20%, #0f172a 0%, #020617 90%)' }}>
                    {/* Header with logos */}
                    <header className="px-6 py-4 border-b border-white/5 backdrop-blur-md bg-slate-900/60 sticky top-0 z-20">
                        <div className="max-w-full mx-auto flex items-center justify-between">
                            <div className="flex items-center space-x-3">
                                <img src="https://github.com/KenMorganRealEstate/Home/blob/main/KenMorganLogoBestOneTransparent.png?raw=true" alt="Ken Morgan" className="h-10 w-auto" onError={(e) => { e.target.style.display = 'none'; }} />
                                <div className="h-8 w-px bg-white/20"></div>
                                <img src="https://github.com/KenMorganRealEstate/Home/blob/main/CASORA%20PRIMARY%20LOGO_blue.png?raw=true" alt="Casora!" className="h-10 w-auto" onError={(e) => { e.target.style.display = 'none'; }} />
                                <div>
                                    <h1 className="text-xl font-bold tracking-tight text-white">Agency Command Center</h1>
                                    <p className="text-xs text-slate-400 uppercase tracking-widest">Casora! Realty Inc.</p>
                                </div>
                            </div>
                            <div className="flex space-x-2 items-center">
                                <span className="text-slate-400 text-xs mr-3 hidden sm:block">Welcome, Ken</span>
                                <div className="h-8 w-8 rounded-full bg-slate-700 flex items-center justify-center">
                                    <i data-lucide="user" className="w-4 h-4 text-slate-300"></i>
                                </div>
                            </div>
                        </div>
                    </header>

                    <div className="flex flex-1">
                        {/* Sidebar track selector */}
                        <aside className="w-72 bg-slate-900/40 border-r border-white/5 p-5 hidden lg:flex flex-col space-y-6">
                            <h2 className="text-xs font-bold text-slate-500 uppercase tracking-widest">Workflows</h2>
                            <nav className="space-y-1 flex-1">
                                {[
                                    { id: 'list_freehold', label: 'List Freehold', icon: 'home' },
                                    { id: 'list_condo', label: 'List Condo', icon: 'building' },
                                    { id: 'list_lease', label: 'List Lease (Landlord)', icon: 'key' },
                                    { id: 'buy_freehold', label: 'Buy Freehold', icon: 'shopping-cart' },
                                    { id: 'buy_condo', label: 'Buy Condo', icon: 'building' },
                                    { id: 'rep_tenant', label: 'Rep Tenant (Renter)', icon: 'user-check' },
                                ].map(track => (
                                    <button key={track.id} onClick={() => setActiveTrack(track.id)} className={`w-full text-left px-4 py-3 rounded-lg flex items-center space-x-3 transition-all ${activeTrack === track.id ? 'bg-white/10 text-white shadow-lg' : 'text-slate-400 hover:bg-white/5 hover:text-white'}`}>
                                        <i data-lucide={track.icon} className="w-5 h-5"></i>
                                        <span className="font-medium">{track.label}</span>
                                    </button>
                                ))}
                            </nav>
                            <div className="pt-6 border-t border-white/5">
                                <div className="glass-card p-4 rounded-xl">
                                    <p className="text-xs text-slate-400 mb-2">Global Progress</p>
                                    <div className="text-2xl font-black text-white">{Math.round(progressPercentage)}%</div>
                                    <div className="w-full bg-slate-700 rounded-full h-1.5 mt-2">
                                        <div className={`h-full rounded-full bg-gradient-to-r ${activeTheme.gradient}`} style={{ width: `${progressPercentage}%` }}></div>
                                    </div>
                                </div>
                            </div>
                        </aside>

                        {/* Main content area */}
                        <main className="flex-1 p-6 lg:p-10 max-w-6xl mx-auto w-full">
                            {/* Mobile track pills */}
                            <div className="lg:hidden mb-8">
                                <div className="flex space-x-2 overflow-x-auto pb-2">
                                    {['list_freehold','list_condo','list_lease','buy_freehold','buy_condo','rep_tenant'].map(track => (
                                        <button key={track} onClick={() => setActiveTrack(track)} className={`track-pill px-4 py-2 rounded-full text-sm font-medium whitespace-nowrap ${activeTrack === track ? 'active text-white' : 'bg-slate-800 text-slate-400'}`}>{track.replace(/_/g, ' ')}</button>
                                    ))}
                                </div>
                            </div>

                            {/* Flow Chart */}
                            <div className="relative pl-14 flow-line">
                                {currentData.map((phaseData, phaseIdx) => (
                                    <div key={phaseIdx} className="mb-14 flow-node">
                                        <div className="ml-4">
                                            <h3 className="text-2xl font-black text-white mb-1">{phaseData.phase}</h3>
                                            <p className="text-slate-400 text-sm mb-8">{phaseData.description}</p>
                                        </div>
                                        <div className="space-y-3">
                                            {phaseData.items.map((item) => {
                                                const isOpen = openAccordion === item.id;
                                                const isCompleted = completedItems[item.id];
                                                return (
                                                    <div key={item.id} className={`glass-card rounded-xl border transition-all duration-300 ${isCompleted ? 'border-green-500/30 shadow-green-500/10' : 'border-white/5 hover:border-white/10'}`}>
                                                        <div className="flex items-center justify-between p-4 cursor-pointer" onClick={() => toggleAccordion(item.id)}>
                                                            <div className="flex items-start space-x-4">
                                                                <div className="flex-shrink-0 mt-1" onClick={(e) => toggleCompletion(item.id, e)}>
                                                                    <div className={`toggle-switch ${isCompleted ? 'active' : ''}`}></div>
                                                                </div>
                                                                <div>
                                                                    <div className="flex items-center gap-2 mb-1">
                                                                        <i data-lucide={item.icon} className={`w-4 h-4 ${isCompleted ? 'text-green-400' : 'text-slate-500'}`}></i>
                                                                        <h4 className={`text-base font-bold ${isCompleted ? 'text-green-400 line-through' : 'text-white'}`}>{item.title}</h4>
                                                                        <span className={`px-2 py-0.5 rounded text-[10px] font-bold uppercase ${item.color}`}>{item.badge}</span>
                                                                    </div>
                                                                    <p className="text-slate-400 text-xs">{item.description}</p>
                                                                </div>
                                                            </div>
                                                            <i data-lucide="chevron-down" className={`w-5 h-5 text-slate-500 transition-transform ${isOpen ? 'rotate-180 text-blue-400' : ''}`}></i>
                                                        </div>
                                                        <div className={`accordion-content ${isOpen ? 'open' : 'closed'}`}>
                                                            <div className="p-5 bg-slate-900/30 border-t border-white/5 rounded-b-xl">
                                                                <div className="space-y-4">
                                                                    {item.sections.map((section, sIdx) => (
                                                                        <div key={sIdx} className="bg-slate-800/60 p-4 rounded-lg border border-white/5">
                                                                            <h5 className="font-bold text-slate-200 mb-3">{section.title}</h5>
                                                                            <ul className="space-y-3">
                                                                                {section.steps.map((step, idx) => (
                                                                                    <li key={idx} className="text-sm text-slate-300" dangerouslySetInnerHTML={{ __html: step }}></li>
                                                                                ))}
                                                                            </ul>
                                                                        </div>
                                                                    ))}
                                                                </div>
                                                            </div>
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </main>
                    </div>
                    <footer className="text-center text-slate-600 text-xs py-6 border-t border-white/5">
                        Casora! Realty Inc. — Agency Command Center — For internal use only. Always consult your Broker of Record.
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
