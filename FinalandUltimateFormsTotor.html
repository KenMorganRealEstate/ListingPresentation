                                            <div>
                                                <h4 className={`font-bold ${isActive ? 'text-white' : 'text-slate-300'}`}>{c.name}</h4>
                                                <p className="text-xs text-slate-400 mt-0.5 flex items-center gap-1.5"><i data-lucide={trackMeta.icon} className="w-3 h-3"></i> {trackMeta.title}</p>
                                            </div>
                                            <button onClick={(e) => deleteClient(c.id, e)} className="text-slate-500 hover:text-red-400 opacity-0 group-hover:opacity-100 transition"><i data-lucide="trash-2" className="w-4 h-4"></i></button>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                        <div className="p-4 border-t border-white/10 bg-black/10 grid grid-cols-2 gap-2">
                            <label className="flex items-center justify-center space-x-2 py-2 px-3 bg-white/5 hover:bg-white/10 text-slate-300 text-xs font-semibold rounded-xl cursor-pointer transition border border-white/5">
                                <i data-lucide="upload" className="w-3.5 h-3.5"></i> <span>Import</span>
                                <input type="file" accept=".json" className="hidden" onChange={handleImport} />
                            </label>
                            <button onClick={handleExport} className="flex items-center justify-center space-x-2 py-2 px-3 bg-white/5 hover:bg-white/10 text-slate-300 text-xs font-semibold rounded-xl transition border border-white/5">
                                <i data-lucide="download" className="w-3.5 h-3.5"></i> <span>Export</span>
                            </button>
                        </div>
                    </aside>

                    {/* MAIN CONTENT */}
                    <main className="flex-1 flex flex-col relative overflow-hidden bg-white/80 backdrop-blur-sm print:bg-white print:w-full">
                        {!activeClient ? (
                            <div className="flex-1 flex flex-col items-center justify-center text-slate-400 no-print">
                                <i data-lucide="folder-open" className="w-20 h-20 mb-4 text-slate-300"></i>
                                <h2 className="text-2xl font-bold text-slate-600">No Client Selected</h2>
                                <p className="mt-2 text-sm">Select a client from the sidebar or add a new one.</p>
                            </div>
                        ) : (
                            <>
                                <header className="bg-white/90 backdrop-blur-md sticky top-0 z-10 px-8 py-5 flex justify-between items-center border-b border-slate-200/60 shadow-sm no-print">
                                    <div>
                                        <div className="flex items-center gap-3 mb-1">
                                            <span className="px-3 py-1 bg-slate-100 text-slate-600 text-[10px] font-bold uppercase tracking-widest rounded-full border border-slate-200 flex items-center gap-1.5">
                                                <i data-lucide={currentTrack.icon} className="w-3 h-3"></i> {currentTrack.title}
                                            </span>
                                            <button onClick={toggleAllSections} className="text-xs text-slate-500 hover:text-indigo-600 underline underline-offset-2 transition">
                                                {currentTrackIds.every(id => activeClient.expandedNodes[id]) ? 'Collapse All' : 'Expand All'}
                                            </button>
                                        </div>
                                        <h1 className="text-3xl font-extrabold text-slate-800 tracking-tight">{activeClient.name}</h1>
                                        {activeClient.property && <p className="text-sm text-slate-500 font-medium">{activeClient.property}</p>}
                                    </div>
                                    <div className="flex items-center space-x-6 bg-white/80 backdrop-blur p-3 rounded-2xl border border-slate-200/60 shadow-sm">
                                        <div className="text-right pr-6 border-r border-slate-200">
                                            <div className="flex items-end justify-end space-x-2 mb-1.5">
                                                <span className="text-2xl font-black text-indigo-600 leading-none">{Math.round(progressPercentage)}%</span>
                                                <span className="text-slate-400 text-xs font-bold uppercase tracking-wider mb-0.5">({completedCount}/{totalItems})</span>
                                            </div>
                                            <div className="w-32 h-2 bg-slate-200 rounded-full overflow-hidden">
                                                <div className="h-full bg-gradient-to-r from-indigo-500 to-purple-500 rounded-full transition-all duration-700 ease-out" style={{ width: `${progressPercentage}%` }}></div>
                                            </div>
                                        </div>
                                        <button onClick={() => window.print()} className="p-2 text-slate-400 hover:text-indigo-600 hover:bg-indigo-50 rounded-lg transition" title="Print Checklist"><i data-lucide="printer" className="w-6 h-6"></i></button>
                                    </div>
                                </header>
                                <div className="hidden print:block mb-8 border-b-2 border-slate-800 pb-4">
                                    <h1 className="text-3xl font-black text-slate-900">Casora! Forms Guide</h1>
                                    <h2 className="text-xl font-bold text-slate-700 mt-2">Client: {activeClient.name} {activeClient.property ? `— ${activeClient.property}` : ''}</h2>
                                    <p className="text-sm text-slate-500">Track: {currentTrack.title} | Status: {Math.round(progressPercentage)}% Complete</p>
                                    <p className="text-sm text-slate-500 mt-2">Designed by Ken Morgan — © {new Date().getFullYear()} Ken Morgan. All rights reserved.</p>
                                </div>
                                <div className="flex-1 overflow-y-auto px-6 py-8 lg:p-12 custom-scrollbar print:bg-white print:p-0">
                                    <div className="max-w-4xl mx-auto relative">
                                        <div className="timeline-line hidden sm:block no-print"></div>
                                        <div className="space-y-10 pb-16 print:space-y-6 print:pb-0">
                                            {currentData.map((phaseData, phaseIdx) => (
                                                <div key={phaseIdx} className="relative z-10 print-break-inside-avoid print:mb-8">
                                                    <div className="flex items-center mb-6 relative">
                                                        <div className="hidden sm:flex absolute left-5 -translate-x-1/2 w-6 h-6 rounded-full bg-white border-[3px] border-indigo-300 shadow-sm z-10 no-print"></div>
                                                        <div className="sm:ml-12 bg-white/80 backdrop-blur-sm border border-white/60 px-6 py-5 rounded-2xl shadow-lg shadow-slate-200/50 w-full relative print:shadow-none print:border-slate-400">
                                                            <div className="absolute top-0 left-0 w-1.5 h-full bg-gradient-to-b from-indigo-400 to-purple-400 rounded-l-xl no-print"></div>
                                                            <h3 className="text-sm font-bold text-indigo-700 uppercase tracking-widest print:text-slate-900 print:text-lg">{phaseData.phase}</h3>
                                                            <p className="text-slate-600 text-sm mt-1">{replaceLinks(phaseData.description)}</p>
                                                        </div>
                                                    </div>
                                                    <div className="space-y-4 sm:ml-12 print:ml-4">
                                                        {phaseData.items.map((item) => {
                                                            const isExpanded = activeClient.expandedNodes[item.id] !== false;
                                                            const isCompleted = activeClient.completedItems[item.id] || false;
                                                            return (
                                                                <div key={item.id} className="relative group/task print-break-inside-avoid">
                                                                    <div className="hidden sm:block absolute left-[-2rem] top-1/2 w-8 h-[2px] bg-slate-200 no-print"></div>
                                                                    <div className={`hidden sm:block absolute left-[-2rem] top-1/2 -translate-x-1/2 -translate-y-1/2 w-4 h-4 rounded-full border-2 z-10 no-print transition-colors ${
                                                                        isCompleted ? 'bg-indigo-500 border-white shadow-md' : 'bg-white border-slate-300'
                                                                    }`}></div>
                                                                    <div className={`bg-white/90 backdrop-blur-sm rounded-2xl border transition-all duration-300 ${
                                                                        isCompleted ? 'border-indigo-200 shadow-md shadow-indigo-100/50' : 'border-slate-200/60 shadow-sm hover:shadow-md'
                                                                    }`}>
                                                                        <div className="p-4 flex items-center justify-between cursor-pointer print:cursor-default" onClick={() => toggleAccordion(item.id)}>
                                                                            <div className="flex items-center space-x-4 flex-1">
                                                                                <div className={`p-2.5 rounded-xl no-print transition-colors ${
                                                                                    isCompleted ? 'bg-indigo-50 text-indigo-600' : 'bg-slate-100 text-slate-500'
                                                                                }`}><i data-lucide={item.icon} className="w-5 h-5"></i></div>
                                                                                <div className="hidden print:block w-5 h-5 border-2 border-slate-400 rounded mr-2 flex-shrink-0">{isCompleted && <div className="w-full h-full text-black text-center leading-4 font-bold">✓</div>}</div>
                                                                                <div>
                                                                                    <div className="flex flex-wrap items-center gap-2 mb-1">
                                                                                        <h4 className={`text-base font-bold ${isCompleted ? 'text-slate-400 line-through print:no-underline print:text-slate-900' : 'text-slate-800'}`}>{item.title}</h4>
                                                                                        <span className={`px-2 py-0.5 rounded-full text-[9px] font-bold uppercase tracking-wider border ${item.color}`}>{item.badge}</span>
                                                                                    </div>
                                                                                    <p className="text-slate-500 text-sm print:text-xs" dangerouslySetInnerHTML={parseStepText(item.description)}></p>
                                                                                </div>
                                                                            </div>
                                                                            <div className="flex items-center space-x-4 ml-4 no-print">
                                                                                <ToggleSwitch checked={!!isCompleted} onChange={() => toggleCompletion(item.id)} />
                                                                                <i data-lucide="chevron-down" className={`w-5 h-5 text-slate-400 transition-transform ${isExpanded ? 'rotate-180 text-indigo-600' : ''}`}></i>
                                                                            </div>
                                                                        </div>
                                                                        <div className={`accordion-content ${isExpanded ? 'open' : 'closed'} print:open`}>
                                                                            <div className="px-5 pb-5 pt-3 border-t border-slate-100 bg-slate-50/50 backdrop-blur-sm rounded-b-2xl print:p-2 print:border-none print:bg-white">
                                                                                <div className="space-y-4">
                                                                                    {item.sections.map((section, sIdx) => (
                                                                                        <div key={sIdx} className="bg-white border border-slate-200 p-5 rounded-xl shadow-sm print:shadow-none print:border-dashed">
                                                                                            <h5 className="font-bold text-slate-800 mb-3 text-xs uppercase tracking-wider">{section.title}</h5>
                                                                                            <ul className="space-y-3">
                                                                                                {section.steps.map((step, idx) => (
                                                                                                    <li key={idx} className="flex items-start text-slate-600 text-sm leading-relaxed print:text-xs">
                                                                                                        <div className="mt-1.5 mr-3 w-1.5 h-1.5 rounded-full bg-indigo-400 flex-shrink-0 print:hidden"></div>
                                                                                                        <span dangerouslySetInnerHTML={parseStepText(step)}></span>
                                                                                                    </li>
                                                                                                ))}
                                                                                            </ul>
                                                                                        </div>
                                                                                    ))}
                                                                                </div>
                                                                            </div>
                                                                        </div>
                                                                    </div>
                                                                </div>
                                                            );
                                                        })}
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </>
                        )}
                    </main>
                    {showAddModal && (
                        <div className="fixed inset-0 bg-slate-900/70 backdrop-blur-sm z-50 flex items-center justify-center p-4 no-print">
                            <div className="bg-white rounded-3xl shadow-2xl w-full max-w-md overflow-hidden border border-white/60">
                                <div className="bg-gradient-to-r from-indigo-50 to-purple-50 p-5 border-b border-slate-200 flex justify-between items-center">
                                    <h3 className="font-bold text-lg text-slate-800">Add New Client</h3>
                                    <button onClick={() => setShowAddModal(false)} className="text-slate-400 hover:text-slate-700"><i data-lucide="x" className="w-5 h-5"></i></button>
                                </div>
                                <form onSubmit={handleAddClient} className="p-6 space-y-4">
                                    <div><label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Client Name *</label><input type="text" required value={newClientName} onChange={e => setNewClientName(e.target.value)} placeholder="e.g. Smith Family" className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none" /></div>
                                    <div><label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Property Info (Optional)</label><input type="text" value={newClientProp} onChange={e => setNewClientProp(e.target.value)} placeholder="e.g. 123 Main St" className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none" /></div>
                                    <div><label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Workflow Track</label><select value={newClientTrack} onChange={e => setNewClientTrack(e.target.value)} className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none font-medium text-slate-700">{Object.entries(trackDefinitions).map(([key, def]) => (<option key={key} value={key}>{def.title}</option>))}</select></div>
                                    <div className="pt-4"><button type="submit" className="w-full bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-700 hover:to-purple-700 text-white font-bold py-3 rounded-xl transition-all shadow-lg shadow-indigo-500/20">Create Workflow</button></div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
