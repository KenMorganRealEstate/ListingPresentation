<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casora! Realty Inc. - Ultimate Agency Masterclass</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel for JSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f1f5f9; }
        .accordion-content { transition: max-height 0.4s ease-in-out, opacity 0.4s ease-in-out; overflow: hidden; }
        .accordion-content.open { max-height: 8000px; opacity: 1; }
        .accordion-content.closed { max-height: 0; opacity: 0; }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        .tag-mandatory { background-color: #fee2e2; color: #991b1b; padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; font-weight: 800; margin-right: 6px; vertical-align: middle; display: inline-block;}
        .tag-optional { background-color: #f1f5f9; color: #475569; padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; font-weight: 800; margin-right: 6px; vertical-align: middle; display: inline-block;}
        .tag-ask { background-color: #fef3c7; color: #92400e; padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; font-weight: 800; margin-right: 6px; vertical-align: middle; display: inline-block;}
        .tag-script { background-color: #dbeafe; color: #1e40af; padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; font-weight: 800; margin-right: 6px; vertical-align: middle; display: inline-block;}
        .tag-dd { background-color: #fef08a; color: #854d0e; padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; font-weight: 800; margin-right: 6px; vertical-align: middle; display: inline-block;}
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- SELLER TRACK DATA ---
        const sellerData = [
            {
                phase: "Phase 1: Pre-Listing Research & Primer",
                description: "Handling TRESA compliance and legal due diligence before you even step into the house.",
                items: [
                    {
                        id: "s_due_diligence",
                        title: "1. Pre-Listing Due Diligence",
                        badge: "Office Research",
                        color: "bg-orange-100 text-orange-800",
                        icon: "search",
                        description: "Mandatory legal checks to perform BEFORE the appointment.",
                        sections: [
                            {
                                title: "Title & Ownership Verification",
                                steps: [
                                    "<span class='tag-dd'>[DUE DILIGENCE]</span> <strong>GeoWarehouse:</strong> Pull the property report to verify exact legal names on title. You cannot legally list unless all owners sign.",
                                    "<span class='tag-dd'>[DUE DILIGENCE]</span> <strong>Estates/POA:</strong> If deceased or using a POA, you MUST obtain the Certificate of Appointment of Estate Trustee or the POA document."
                                ]
                            }
                        ]
                    },
                    {
                        id: "s_pre_email",
                        title: "2. Advance Email & RECO Delivery",
                        badge: "Digital Delivery",
                        color: "bg-indigo-100 text-indigo-800",
                        icon: "mail",
                        description: "Send 24 hours before your meeting.",
                        sections: [
                            {
                                title: "Email Template",
                                steps: [
                                    "<span class='tag-mandatory'>[MANDATORY]</span> You must provide the RECO Guide before providing services.",
                                    "<div class='bg-white border p-4 rounded mt-2 text-sm text-slate-700 italic border-l-4 border-l-indigo-500'><strong>Subject:</strong> Looking forward to our meeting + Important Info<br><br>Hi [Client Name],<br><br>I am looking forward to our meeting tomorrow. Because the province recently updated the rules for real estate representation, I am required by law to provide you with the attached RECO Information Guide before we officially begin our services. Please give it a quick read-through. We will briefly touch on it tomorrow.<br><br>Best,<br>[Your Name]</div>"
                                ]
                            }
                        ]
                    }
                ]
            },
            {
                phase: "Phase 2: The Kitchen Table (Contracts)",
                description: "Command the room. Bring these forms printed. Secure wet-ink signatures.",
                items: [
                    {
                        id: "s_form271",
                        title: "3. OREA Form 271 - Listing Agreement",
                        badge: "Paper Contract",
                        color: "bg-amber-100 text-amber-800",
                        icon: "file-signature",
                        description: "The core legal contract securing you as Designated Representative.",
                        sections: [
                            {
                                title: "Form Breakdown",
                                steps: [
                                    "<span class='tag-mandatory'>[MANDATORY]</span> <strong>Designated Rep:</strong> Your exact name. (Crucial TRESA rule).",
                                    "<span class='tag-mandatory'>[MANDATORY]</span> <strong>Dates:</strong> Commencing and Expiring times.",
                                    "<span class='tag-mandatory'>[MANDATORY]</span> <strong>Commission:</strong> Total %, Co-op %, and Holdover days.",
                                    "<span class='tag-dd'>[DUE DILIGENCE]</span> <span class='tag-ask'>[ASK SELLER]</span> <strong>Spousal Consent:</strong> Is it a matrimonial home and spouse isn't on title? They must sign Page 4.",
                                    "<span class='tag-mandatory'>[MANDATORY]</span> <strong>Schedule A:</strong> Ensure Casora's Schedule A is attached and initialled."
                                ]
                            }
                        ]
                    },
                    {
                        id: "s_fintrac",
                        title: "4. FINTRAC ID Records",
                        badge: "Paper Form",
                        color: "bg-amber-100 text-amber-800",
                        icon: "fingerprint",
                        description: "Federal anti-money laundering verification.",
                        sections: [
                            {
                                title: "Verification",
                                steps: [
                                    "<span class='tag-mandatory'>[MANDATORY]</span> Check Driver's License or Passport. Copy ID Number and Expiry exactly.",
                                    "<span class='tag-ask'>[ASK SELLER]</span> Ask for their Principal Business/Occupation.",
                                    "<span class='tag-mandatory'>[MANDATORY]</span> Section D (Purpose): Check 'Residential Property' and 'Sale'."
                                ]
                            }
                        ]
                    },
                    {
                        id: "s_form244",
                        title: "5. Form 244 & Lockbox Direction",
                        badge: "Paper Contract",
                        color: "bg-amber-100 text-amber-800",
                        icon: "lock",
                        description: "Rules of engagement for offers and property access.",
                        sections: [
                            {
                                title: "Form 244 & Lockbox",
                                steps: [
                                    "<span class='tag-ask'>[ASK SELLER]</span> <strong>Holding Offers:</strong> If holding, enter Date/Time and check YES or NO for Pre-emptive offers.",
                                    "<span class='tag-mandatory'>[MANDATORY]</span> <strong>Lockbox:</strong> Get signature authorizing the lockbox placement."
                                ]
                            }
                        ]
                    }
                ]
            },
            {
                phase: "Phase 3: Back-Office Polish & MLS",
                description: "Drafting the MLS data at your desk and sending for e-signature.",
                items: [
                    {
                        id: "s_mls",
                        title: "6. PropTx 290 & BrokerBay",
                        badge: "Digital Entry",
                        color: "bg-blue-100 text-blue-800",
                        icon: "monitor",
                        description: "MLS data and showing instructions.",
                        sections: [
                            {
                                title: "Setup",
                                steps: [
                                    "<span class='tag-mandatory'>[MANDATORY]</span> Fill room measurements, taxes, and legal description.",
                                    "<span class='tag-mandatory'>[MANDATORY]</span> Set up BrokerBay contacts and offer email.",
                                    "<span class='tag-mandatory'>[MANDATORY]</span> Email both to Seller via DocuSign/Authentisign for final approval before going live."
                                ]
                            }
                        ]
                    }
                ]
            },
            {
                phase: "Phase 4: Deal Completion",
                description: "Processing the firm deal.",
                items: [
                    {
                        id: "s_dealsummary",
                        title: "7. CASORA Deal Summary",
                        badge: "Internal Form",
                        color: "bg-purple-100 text-purple-800",
                        icon: "briefcase",
                        description: "Submitted when a deal goes FIRM.",
                        sections: [
                            {
                                title: "Financials",
                                steps: [
                                    "<span class='tag-mandatory'>[MANDATORY]</span> Enter the exact Deposit held by Casora.",
                                    "<span class='tag-mandatory'>[MANDATORY]</span> Break down commission due to Casora and the Co-op Brokerage."
                                ]
                            }
                        ]
                    }
                ]
            }
        ];

        // --- BUYER TRACK DATA ---
        const buyerData = [
            {
                phase: "Phase 1: Buyer Consultation & Agency",
                description: "Establishing the relationship, fulfilling TRESA requirements, and verifying ID before writing any offers.",
                items: [
                    {
                        id: "b_reco",
                        title: "1. RECO Guide & Agency Discussion",
                        badge: "Dialogue & Sign-off",
                        color: "bg-indigo-100 text-indigo-800",
                        icon: "book-open",
                        description: "Must be handled BEFORE showing houses or drafting offers.",
                        sections: [
                            {
                                title: "The Conversation",
                                steps: [
                                    "<span class='tag-mandatory'>[MANDATORY]</span> <strong>Provide the Guide:</strong> Email the RECO Information Guide in advance.",
                                    "<span class='tag-script'>[SCRIPT]</span> <em>\"Before we start looking at properties and discussing strategy, TRESA requires me to explain representation. I will be acting as your Designated Representative. This means my sole loyalty is to you, I will negotiate fiercely on your behalf, and everything you tell me about your budget is strictly confidential.\"</em>",
                                    "<span class='tag-mandatory'>[MANDATORY]</span> <strong>Sign-off:</strong> Have the buyer(s) sign Page 13 of the RECO guide."
                                ]
                            }
                        ]
                    },
                    {
                        id: "b_form371",
                        title: "2. Form 371 - Buyer Representation",
                        badge: "Paper/Digital Contract",
                        color: "bg-amber-100 text-amber-800",
                        icon: "file-signature",
                        description: "The core legal contract locking them in as your client.",
                        sections: [
                            {
                                title: "Header & Scope",
                                steps: [
                                    "<span class='tag-mandatory'>[MANDATORY]</span> <strong>Brokerage:</strong> Casora! Realty Inc., Brokerage",
                                    "<span class='tag-mandatory'>[MANDATORY]</span> <strong>Designated Representative:</strong> Your exact name.",
                                    "<span class='tag-mandatory'>[MANDATORY]</span> <strong>Commencing/Expiring:</strong> Set the timeline (e.g., 3 to 6 months). <span class='tag-mandatory'>[MANDATORY]</span> If over 6 months, buyer MUST initial.",
                                    "<span class='tag-mandatory'>[MANDATORY]</span> <strong>Property Type & Geographic Location:</strong> E.g., 'Single Family Residential' in 'Hamilton, Burlington, and surrounding area'."
                                ]
                            },
                            {
                                title: "Clause 2 (Commission)",
                                steps: [
                                    "<span class='tag-script'>[SCRIPT]</span> <em>\"This section states my fee is [e.g., 2.5%]. In almost every case, the Seller pays this out of the proceeds of the sale. However, if we buy a For Sale By Owner or a property offering less than 2.5%, you would be responsible for the difference, but we would negotiate that into our offer.\"</em>",
                                    "<span class='tag-mandatory'>[MANDATORY]</span> Fill in the Total Commission % and the Holdover period (e.g., 60 days)."
                                ]
                            },
                            {
                                title: "Signatures",
                                steps: [
                                    "<span class='tag-mandatory'>[MANDATORY]</span> You sign to bind the brokerage. Buyer signs.",
                                    "<span class='tag-mandatory'>[MANDATORY]</span> Ensure Casora! Schedule A is attached and initialled."
                                ]
                            }
                        ]
                    },
                    {
                        id: "b_fintrac",
                        title: "3. FINTRAC ID Verification",
                        badge: "Compliance",
                        color: "bg-amber-100 text-amber-800",
                        icon: "fingerprint",
                        description: "Anti-money laundering check. Best done before drafting the first offer.",
                        sections: [
                            {
                                title: "Verification",
                                steps: [
                                    "<span class='tag-mandatory'>[MANDATORY]</span> Verify physical ID (Driver's License or Passport). Note number and expiry.",
                                    "<span class='tag-mandatory'>[MANDATORY]</span> Section D: Check 'Residential Property' and 'Purchase'.",
                                    "<span class='tag-dd'>[DUE DILIGENCE]</span> <span class='tag-ask'>[ASK BUYER]</span> Ask: <em>\"Are you buying this home for yourself, or on behalf of a third party (like a child or a company)?\"</em> If third party, fill the Third Party section."
                                ]
                            }
                        ]
                    },
                    {
                        id: "b_form160",
                        title: "4. OREA Form 160 (Disclosure)",
                        badge: "Conditional Form",
                        color: "bg-red-100 text-red-800",
                        icon: "alert-triangle",
                        description: "ONLY if you or a family member/Casora! is the Buyer.",
                        sections: [
                            {
                                title: "When & How to use",
                                steps: [
                                    "<span class='tag-mandatory'>[MANDATORY]</span> If YOU are buying a property, you must declare you are a Realtor using this form.",
                                    "<span class='tag-mandatory'>[MANDATORY]</span> This must be presented to the Seller <strong>PRIOR TO</strong> presenting the actual offer."
                                ]
                            }
                        ]
                    }
                ]
            },
            {
                phase: "Phase 2: Drafting the Offer",
                description: "The heavy lifting. Writing the Agreement of Purchase and Sale.",
                items: [
                    {
                        id: "b_due_diligence",
                        title: "5. Pre-Offer Due Diligence",
                        badge: "Research",
                        color: "bg-orange-100 text-orange-800",
                        icon: "search",
                        description: "Checks before writing the APS.",
                        sections: [
                            {
                                title: "Checklist",
                                steps: [
                                    "<span class='tag-dd'>[DUE DILIGENCE]</span> <strong>MLS Attachments:</strong> Download the listing brokerage's Schedule B (trust account info/clauses) and any Seller Disclosures.",
                                    "<span class='tag-dd'>[DUE DILIGENCE]</span> <strong>GeoWarehouse/MPAC:</strong> Verify the exact legal description and lot size matches the MLS.",
                                    "<span class='tag-dd'>[DUE DILIGENCE]</span> Call the listing agent to confirm if there are any other offers registered."
                                ]
                            }
                        ]
                    },
                    {
                        id: "b_form100",
                        title: "6. Form 100 - Agreement of Purchase & Sale",
                        badge: "Core Contract",
                        color: "bg-blue-100 text-blue-800",
                        icon: "file-text",
                        description: "The primary offer document.",
                        sections: [
                            {
                                title: "Page 1: Terms",
                                steps: [
                                    "<span class='tag-mandatory'>[MANDATORY]</span> <strong>Buyer/Seller:</strong> Exact legal names.",
                                    "<span class='tag-mandatory'>[MANDATORY]</span> <strong>Property:</strong> Address, Frontage/Depth, and exact Legal Description.",
                                    "<span class='tag-mandatory'>[MANDATORY]</span> <strong>Price & Deposit:</strong> Write price. Deposit is usually 'Upon Acceptance' (must be delivered within 24hrs of firm deal). Make deposit payable to the <em>Listing Brokerage Trust Account</em>.",
                                    "<span class='tag-mandatory'>[MANDATORY]</span> <strong>Irrevocability:</strong> Date and Time the offer expires.",
                                    "<span class='tag-mandatory'>[MANDATORY]</span> <strong>Completion Date:</strong> The closing day."
                                ]
                            },
                            {
                                title: "Pages 2 & 3: Clauses",
                                steps: [
                                    "<span class='tag-mandatory'>[MANDATORY]</span> <strong>Chattels Included:</strong> List exactly what stays (e.g., Fridge, Stove, Washer, Dryer, ELF's, Window Coverings). Do not assume!",
                                    "<span class='tag-mandatory'>[MANDATORY]</span> <strong>Rental Items:</strong> Note hot water heater, furnace, etc. Buyer assumes these contracts.",
                                    "<span class='tag-mandatory'>[MANDATORY]</span> <strong>Title Search:</strong> Usually set 1-2 weeks before the Completion Date."
                                ]
                            },
                            {
                                title: "Schedule A & B",
                                steps: [
                                    "<span class='tag-mandatory'>[MANDATORY]</span> <strong>Schedule A:</strong> Insert your Buyer conditions (Financing, Home Inspection, Status Certificate if a condo).",
                                    "<span class='tag-mandatory'>[MANDATORY]</span> <strong>Schedule B:</strong> Attach the Listing Brokerage's Schedule B (found on MLS)."
                                ]
                            }
                        ]
                    },
                    {
                        id: "b_form127",
                        title: "7. Form 127 - Buyer Acknowledgement",
                        badge: "CYA Form",
                        color: "bg-red-100 text-red-800",
                        icon: "shield-alert",
                        description: "Used if Buyer writes a 'Firm' offer or waives a condition.",
                        sections: [
                            {
                                title: "Protecting Your License",
                                steps: [
                                    "<span class='tag-script'>[SCRIPT]</span> <em>\"Because we are in a multiple offer situation, you have chosen to submit an offer without a financing or inspection condition. I support your decision, but RECO requires you to sign this form acknowledging that I advised you of the risks of buying 'as is' without conditions.\"</em>",
                                    "<span class='tag-mandatory'>[MANDATORY]</span> Check the boxes for whatever condition they are waiving/omitting (e.g., Home Inspection). Buyer signs."
                                ]
                            }
                        ]
                    }
                ]
            },
            {
                phase: "Phase 3: Offer Presentation & Co-op",
                description: "Submitting the offer and confirming how commissions are handled.",
                items: [
                    {
                        id: "b_form320",
                        title: "8. Form 320 - Confirmation of Co-operation",
                        badge: "Mandatory Paperwork",
                        color: "bg-emerald-100 text-emerald-800",
                        icon: "handshake",
                        description: "Details exactly who represents who and who gets paid.",
                        sections: [
                            {
                                title: "Section 1 & 2: Representation",
                                steps: [
                                    "<span class='tag-mandatory'>[MANDATORY]</span> <strong>Section 1 (Listing Brokerage):</strong> Check Single Representation (they represent Seller) OR Multiple Representation (if Casora has the listing too).",
                                    "<span class='tag-mandatory'>[MANDATORY]</span> <strong>Section 2 (Co-Operating Brokerage):</strong> Check 'Represents the Interests of the Buyer'."
                                ]
                            },
                            {
                                title: "Section 3 & Signatures",
                                steps: [
                                    "<span class='tag-mandatory'>[MANDATORY]</span> <strong>Section 3 (Commission):</strong> Check the box that says Listing Brokerage will pay Co-Op brokerage, and enter the MLS co-op commission amount (e.g., 2.5%).",
                                    "<span class='tag-mandatory'>[MANDATORY]</span> <strong>Signatures:</strong> YOU sign at the bottom for Casora!. The Buyer signs the Acknowledgement."
                                ]
                            }
                        ]
                    }
                ]
            },
            {
                phase: "Phase 4: Firm Deal & Casora Admin",
                description: "Conditions are fulfilled, deposit is delivered, and paperwork is submitted to the office.",
                items: [
                    {
                        id: "b_waiver_fulfillment",
                        title: "9. Fulfillment / Waiver of Conditions",
                        badge: "Deal Firming",
                        color: "bg-blue-100 text-blue-800",
                        icon: "check-circle",
                        description: "Removing the conditions from the offer.",
                        sections: [
                            {
                                title: "Forms 124 / 123",
                                steps: [
                                    "<span class='tag-mandatory'>[MANDATORY]</span> Once financing/inspection is approved, use <strong>Form 124 (Notice of Fulfillment)</strong> to satisfy the condition.",
                                    "<span class='tag-optional'>[OPTIONAL]</span> Use <strong>Form 123 (Waiver)</strong> if the buyer decides to drop the condition without officially fulfilling it."
                                ]
                            }
                        ]
                    },
                    {
                        id: "b_deposit",
                        title: "10. Deposit Delivery",
                        badge: "Banking",
                        color: "bg-purple-100 text-purple-800",
                        icon: "banknote",
                        description: "Getting the trust funds to the Listing Brokerage.",
                        sections: [
                            {
                                title: "Instructions to Buyer",
                                steps: [
                                    "<span class='tag-dd'>[DUE DILIGENCE]</span> Pull the Deposit Instructions from the MLS listing attachments.",
                                    "<span class='tag-mandatory'>[MANDATORY]</span> Instruct Buyer to get a Bank Draft payable to the LISTING BROKERAGE IN TRUST.",
                                    "<span class='tag-mandatory'>[MANDATORY]</span> Must be delivered within 24 hours of offer acceptance (or as stipulated in the APS)."
                                ]
                            }
                        ]
                    },
                    {
                        id: "b_dealsummary",
                        title: "11. CASORA Deal Summary",
                        badge: "Internal Admin",
                        color: "bg-purple-100 text-purple-800",
                        icon: "briefcase",
                        description: "Getting paid by Casora! office.",
                        sections: [
                            {
                                title: "Office Submission",
                                steps: [
                                    "<span class='tag-mandatory'>[MANDATORY]</span> Fill out Deal Summary. Check 'Selling' under Casora Role.",
                                    "<span class='tag-mandatory'>[MANDATORY]</span> Note: Deposit is held by the <em>Other Brokerage</em>.",
                                    "<span class='tag-mandatory'>[MANDATORY]</span> Submit this to the office with the Firm APS, Form 320, FINTRAC, Form 371, and RECO Acknowledgement."
                                ]
                            }
                        ]
                    }
                ]
            }
        ];

        const App = () => {
            const [activeTrack, setActiveTrack] = useState('seller'); // 'seller' or 'buyer'
            const [openAccordion, setOpenAccordion] = useState(null);
            const [completedItems, setCompletedItems] = useState({});

            const currentData = activeTrack === 'seller' ? sellerData : buyerData;

            const toggleAccordion = (id) => {
                setOpenAccordion(openAccordion === id ? null : id);
            };

            const toggleCompletion = (id, e) => {
                e.stopPropagation();
                setCompletedItems(prev => ({
                    ...prev,
                    [id]: !prev[id]
                }));
            };

            // Calculate overall progress for active track only
            const totalItems = currentData.reduce((acc, phase) => acc + phase.items.length, 0);
            
            // Count only completed items that belong to the current track's IDs
            const currentTrackIds = currentData.flatMap(phase => phase.items.map(item => item.id));
            const completedCount = currentTrackIds.filter(id => completedItems[id]).length;
            const progressPercentage = totalItems === 0 ? 0 : (completedCount / totalItems) * 100;

            useEffect(() => {
                lucide.createIcons();
            });

            return (
                <div className="min-h-screen pb-20">
                    {/* Header */}
                    <header className={`text-white py-12 px-6 shadow-2xl relative overflow-hidden transition-colors duration-500 ${activeTrack === 'seller' ? 'bg-slate-900' : 'bg-slate-800'}`}>
                        <div className={`absolute top-0 left-0 w-full h-1 bg-gradient-to-r ${activeTrack === 'seller' ? 'from-emerald-400 to-blue-500' : 'from-blue-400 to-indigo-500'}`}></div>
                        <div className="max-w-5xl mx-auto relative z-10 flex flex-col md:flex-row justify-between items-start md:items-center">
                            <div>
                                <div className="flex items-center space-x-4 mb-3">
                                    <div className={`${activeTrack === 'seller' ? 'bg-emerald-500' : 'bg-blue-500'} p-2 rounded-lg transition-colors duration-500`}>
                                        <i data-lucide="building-2" className="w-8 h-8 text-white"></i>
                                    </div>
                                    <h1 className="text-4xl font-extrabold tracking-tight">Casora! Realty Inc.</h1>
                                </div>
                                <p className={`${activeTrack === 'seller' ? 'text-emerald-400' : 'text-blue-400'} text-xl font-bold tracking-wide uppercase transition-colors duration-500`}>Ultimate Agency Masterclass</p>
                            </div>

                            {/* Track Switcher */}
                            <div className="mt-6 md:mt-0 bg-white/10 p-1.5 rounded-xl flex border border-white/20">
                                <button 
                                    onClick={() => {setActiveTrack('seller'); setOpenAccordion(null);}}
                                    className={`px-6 py-2.5 rounded-lg font-bold text-sm transition-all flex items-center ${activeTrack === 'seller' ? 'bg-white text-slate-900 shadow-md' : 'text-white/70 hover:text-white'}`}
                                >
                                    <i data-lucide="home" className="w-4 h-4 mr-2"></i>
                                    List Property (Seller)
                                </button>
                                <button 
                                    onClick={() => {setActiveTrack('buyer'); setOpenAccordion(null);}}
                                    className={`px-6 py-2.5 rounded-lg font-bold text-sm transition-all flex items-center ${activeTrack === 'buyer' ? 'bg-white text-slate-900 shadow-md' : 'text-white/70 hover:text-white'}`}
                                >
                                    <i data-lucide="key" className="w-4 h-4 mr-2"></i>
                                    Write Offer (Buyer)
                                </button>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-5xl mx-auto mt-8 px-4 sm:px-6">
                        
                        {/* Progress Tracker Widget */}
                        <div className="bg-white rounded-2xl shadow-md p-6 mb-12 border border-slate-200 relative overflow-hidden">
                            <div className={`absolute top-0 right-0 p-8 opacity-5 transition-colors duration-500 ${activeTrack === 'seller' ? 'text-emerald-900' : 'text-blue-900'}`}>
                                <i data-lucide={activeTrack === 'seller' ? 'target' : 'compass'} className="w-32 h-32"></i>
                            </div>
                            <div className="relative z-10 flex justify-between items-end mb-4">
                                <div>
                                    <h2 className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">{activeTrack === 'seller' ? 'Listing' : 'Purchase'} Workflow</h2>
                                    <p className="text-3xl font-black text-slate-800 tracking-tight">{completedCount} <span className="text-lg font-medium text-slate-400">/ {totalItems} Steps Executed</span></p>
                                </div>
                                <div className={`font-black text-3xl transition-colors duration-500 ${activeTrack === 'seller' ? 'text-emerald-600' : 'text-blue-600'}`}>
                                    {Math.round(progressPercentage)}%
                                </div>
                            </div>
                            <div className="w-full bg-slate-100 rounded-full h-4 overflow-hidden shadow-inner relative z-10">
                                <div className={`h-4 rounded-full transition-all duration-700 ease-out bg-gradient-to-r ${activeTrack === 'seller' ? 'from-emerald-400 to-emerald-600' : 'from-blue-400 to-indigo-500'}`} style={{ width: `${progressPercentage}%` }}></div>
                            </div>
                        </div>

                        {/* Master Timeline Content */}
                        <div className="space-y-16">
                            {currentData.map((phaseData, phaseIdx) => (
                                <div key={phaseIdx} className="relative">
                                    
                                    {/* Phase Header */}
                                    <div className="mb-6">
                                        <h3 className="text-3xl font-black text-slate-800 tracking-tight">
                                            {phaseData.phase}
                                        </h3>
                                        <p className="text-slate-500 font-medium mt-1 text-lg">{phaseData.description}</p>
                                    </div>
                                    
                                    {/* Items List */}
                                    <div className="space-y-5">
                                        {phaseData.items.map((item) => {
                                            const isOpen = openAccordion === item.id;
                                            const isCompleted = completedItems[item.id];

                                            // Styling logic based on track and completion
                                            const themeColor = activeTrack === 'seller' ? 'emerald' : 'blue';
                                            const borderCompleted = activeTrack === 'seller' ? 'border-emerald-400' : 'border-blue-400';
                                            const bgCompleted = activeTrack === 'seller' ? 'bg-emerald-50/20' : 'bg-blue-50/20';
                                            const checkBg = activeTrack === 'seller' ? 'bg-emerald-500 border-emerald-500' : 'bg-blue-500 border-blue-500';
                                            const checkHover = activeTrack === 'seller' ? 'hover:border-emerald-400' : 'hover:border-blue-400';
                                            const iconBg = isCompleted ? (activeTrack === 'seller' ? 'bg-emerald-100 text-emerald-600' : 'bg-blue-100 text-blue-600') : 'bg-slate-100 text-slate-600';

                                            return (
                                                <div key={item.id} className={`bg-white rounded-xl border-2 transition-all duration-300 ${isCompleted ? `${borderCompleted} ${bgCompleted} shadow-sm` : 'border-slate-200 hover:border-slate-300 hover:shadow-md'}`}>
                                                    
                                                    {/* Item Header Bar */}
                                                    <div 
                                                        className="flex items-center justify-between p-5 cursor-pointer"
                                                        onClick={() => toggleAccordion(item.id)}
                                                    >
                                                        <div className="flex items-start space-x-5">
                                                            {/* Checkbox */}
                                                            <button 
                                                                onClick={(e) => toggleCompletion(item.id, e)}
                                                                className={`flex-shrink-0 mt-1 w-8 h-8 rounded-lg border-2 flex items-center justify-center transition-all duration-200 ${isCompleted ? `${checkBg} text-white shadow-sm scale-110` : `border-slate-300 bg-slate-50 text-transparent ${checkHover}`}`}
                                                            >
                                                                <i data-lucide="check" className="w-5 h-5 stroke-[3]"></i>
                                                            </button>
                                                            
                                                            <div>
                                                                <div className="flex flex-wrap items-center gap-3 mb-1">
                                                                    <div className={`p-1.5 rounded-md transition-colors duration-300 ${iconBg}`}>
                                                                        <i data-lucide={item.icon} className="w-4 h-4"></i>
                                                                    </div>
                                                                    <h4 className={`text-xl font-bold tracking-tight transition-colors ${isCompleted ? 'text-slate-400 line-through' : 'text-slate-800'}`}>
                                                                        {item.title}
                                                                    </h4>
                                                                    <span className={`px-3 py-1 rounded-md text-xs font-bold uppercase tracking-wider ${item.color}`}>
                                                                        {item.badge}
                                                                    </span>
                                                                </div>
                                                                <p className="text-slate-500 text-sm font-medium leading-relaxed">{item.description}</p>
                                                            </div>
                                                        </div>
                                                        
                                                        <div className={`text-slate-400 transition-transform duration-300 flex-shrink-0 ${isOpen ? 'rotate-180 text-indigo-500' : ''}`}>
                                                            <i data-lucide="chevron-down" className="w-7 h-7"></i>
                                                        </div>
                                                    </div>

                                                    {/* Expanded Content (Tutorial/Script) */}
                                                    <div className={`accordion-content ${isOpen ? 'open' : 'closed'}`}>
                                                        <div className="p-6 sm:p-8 bg-slate-50/80 border-t-2 border-slate-100 rounded-b-xl">
                                                            
                                                            <div className="space-y-8">
                                                                {item.sections.map((section, sIdx) => (
                                                                    <div key={sIdx} className="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
                                                                        <h5 className="font-bold text-slate-800 mb-5 pb-3 border-b border-slate-100 flex items-center text-lg">
                                                                            <i data-lucide="chevron-right-square" className="w-5 h-5 mr-3 text-indigo-500"></i>
                                                                            {section.title}
                                                                        </h5>
                                                                        <ul className="space-y-4">
                                                                            {section.steps.map((step, idx) => (
                                                                                <li key={idx} className="flex items-start text-slate-700 text-[15px] leading-relaxed">
                                                                                    {/* Determine bullet icon based on content */}
                                                                                    <div className="mt-1 mr-3 flex-shrink-0">
                                                                                        {step.includes('tag-script') || step.includes('tag-ask') ? (
                                                                                             <i data-lucide="message-square" className="w-4 h-4 text-amber-500"></i>
                                                                                        ) : step.includes('tag-dd') ? (
                                                                                             <i data-lucide="shield-check" className="w-4 h-4 text-orange-500"></i>
                                                                                        ) : step.includes('Subject:') ? (
                                                                                             <i data-lucide="mail" className="w-4 h-4 text-indigo-500"></i>
                                                                                        ) : (
                                                                                             <div className="w-2 h-2 rounded-full bg-slate-300 mt-1.5"></div>
                                                                                        )}
                                                                                    </div>
                                                                                    <span className="flex-1" dangerouslySetInnerHTML={{ __html: step }}></span>
                                                                                </li>
                                                                            ))}
                                                                        </ul>
                                                                    </div>
                                                                ))}
                                                            </div>

                                                        </div>
                                                    </div>

                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            ))}
                        </div>
                        
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
