                phase: "Phase 1: Tenant Agency & Verification",
                description: "Establishing representation for a renter.",
                items: [
                    {
                        id: "t_reco",
                        title: "1. RECO Guide & Agency",
                        badge: "Dialogue",
                        color: "bg-indigo-100 text-indigo-800",
                        icon: "book-open",
                        description: "TRESA applies to leases too.",
                        sections: [
                            {
                                title: "The Conversation",
                                steps: [
                                    "<span class='tag-mandatory'>[MANDATORY]</span> Provide the RECO Information Guide and have them sign Page 13."
                                ]
                            }
                        ]
                    },
                    {
                        id: "t_form372",
                        title: "2. Form 372 - Tenant Representation",
                        badge: "Core Contract",
                        color: "bg-amber-100 text-amber-800",
                        icon: "file-signature",
                        description: "The legal contract locking them in as your tenant client.",
                        sections: [
                            {
                                title: "Header & Commission",
                                steps: [
                                    "<span class='tag-mandatory'>[MANDATORY]</span> <strong>Designated Representative:</strong> Your exact name.",
                                    "<span class='tag-mandatory'>[MANDATORY]</span> <strong>Commission:</strong> In leasing, this is usually stated as 'One half of one month's rent' or similar, paid by the Landlord's brokerage."
                                ]
                            }
                        ]
                    },
                    {
                        id: "t_fintrac",
                        title: "3. FINTRAC ID Verification",
                        badge: "Compliance",
                        color: "bg-amber-100 text-amber-800",
                        icon: "fingerprint",
                        description: "Anti-money laundering check.",
                        sections: [
                            {
                                title: "Verification",
                                steps: [
                                    "<span class='tag-mandatory'>[MANDATORY]</span> Verify physical ID. Check 'Residential Property' but change Purpose to 'Lease/Rent'."
                                ]
                            }
                        ]
                    }
                ]
            },
            {
                phase: "Phase 2: Drafting the Lease Offer",
                description: "Submitting the offer to the Landlord.",
                items: [
                    {
                        id: "t_due_diligence",
                        title: "4. Tenant Due Diligence",
                        badge: "Preparation",
                        color: "bg-orange-100 text-orange-800",
                        icon: "file-search",
                        description: "Preparing a strong lease package.",
                        sections: [
                            {
                                title: "The Rental Package",
                                steps: [
                                    "<span class='tag-dd'>[DUE DILIGENCE]</span> Ensure you have the Tenant's Credit Report (Equifax/TransUnion), Employment Letter, Pay Stubs, and References ready to submit alongside the offer."
                                ]
                            }
                        ]
                    },
                    {
                        id: "t_form400",
                        title: "5. Form 400 - Agreement to Lease",
                        badge: "Lease Offer",
                        color: "bg-blue-100 text-blue-800",
                        icon: "file-text",
                        description: "The initial offer to rent the property.",
                        sections: [
                            {
                                title: "Page 1: Terms",
                                steps: [
                                    "<span class='tag-mandatory'>[MANDATORY]</span> <strong>Term of Lease:</strong> State duration (e.g., 1 Year) and exact Commencing Date.",
                                    "<span class='tag-mandatory'>[MANDATORY]</span> <strong>Rent:</strong> State the monthly rent amount.",
                                    "<span class='tag-mandatory'>[MANDATORY]</span> <strong>Deposit:</strong> Usually 'First and last months' rent'. State exact deposit amount. Make deposit payable to the <em>Listing Brokerage Trust Account</em>."
                                ]
                            },
                            {
                                title: "Pages 2 & 3: Clauses",
                                steps: [
                                    "<span class='tag-mandatory'>[MANDATORY]</span> <strong>Post-Dated Cheques:</strong> Indicate how rent will be paid (e.g., 10 post-dated cheques, e-transfer).",
                                    "<span class='tag-mandatory'>[MANDATORY]</span> <strong>Services & Costs:</strong> Clearly define who pays Gas, Oil, Electricity, Water, etc."
                                ]
                            }
                        ]
                    },
                    {
                        id: "t_form160",
                        title: "6. OREA Form 160 (Disclosure)",
                        badge: "Conditional Form",
                        color: "bg-red-100 text-red-800",
                        icon: "alert-triangle",
                        description: "ONLY if you/family are the Tenant.",
                        sections: [
                            {
                                title: "Usage",
                                steps: [
                                    "<span class='tag-mandatory'>[MANDATORY]</span> Must declare if you are leasing the property."
                                ]
                            }
                        ]
                    }
                ]
            },
            {
                phase: "Phase 3: Firm Lease & Standard Agreement",
                description: "Signing the mandatory provincial lease and getting paid.",
                items: [
                    {
                        id: "t_form320",
                        title: "7. Form 320 - Confirmation of Co-operation",
                        badge: "Mandatory Paperwork",
                        color: "bg-emerald-100 text-emerald-800",
                        icon: "handshake",
                        description: "Commission details.",
                        sections: [
                            {
                                title: "Representation & Commission",
                                steps: [
                                    "<span class='tag-mandatory'>[MANDATORY]</span> Section 2: Check 'Represents the Interests of the Buyer/Tenant'. Section 3: Fill Co-op Commission (usually 1/2 month's rent)."
                                ]
                            }
                        ]
                    },
                    {
                        id: "t_ontario_lease",
                        title: "8. Ontario Residential Tenancy Agreement",
                        badge: "Provincial Law",
                        color: "bg-emerald-100 text-emerald-800",
                        icon: "gavel",
                        description: "The 'Standard Lease'. Mandatory in Ontario.",
                        sections: [
                            {
                                title: "Execution",
                                steps: [
                                    "<span class='tag-mandatory'>[MANDATORY]</span> Once Form 400 is accepted, the Landlord MUST provide this Standard Lease to the Tenant. All sections are mandatory and cannot be changed.",
                                    "<span class='tag-mandatory'>[MANDATORY]</span> Ensure Landlord Name, Tenant Name, Unit Address, and Rent match Form 400 perfectly.",
                                    "<span class='tag-optional'>[OPTIONAL]</span> Attach Schedule A from your Form 400 to the 'Additional Terms' section of this Standard Lease."
                                ]
                            }
                        ]
                    },
                    {
                        id: "t_dealsummary",
                        title: "9. CASORA Deal Summary",
                        badge: "Internal Admin",
                        color: "bg-purple-100 text-purple-800",
                        icon: "briefcase",
                        description: "Getting paid for the lease.",
                        sections: [
                            {
                                title: "Office Submission",
                                steps: [
                                    "<span class='tag-mandatory'>[MANDATORY]</span> Type of Transaction: Check <strong>LEASE</strong>.",
                                    "<span class='tag-mandatory'>[MANDATORY]</span> Casora Role: Check <strong>SELLING</strong>.",
                                    "<span class='tag-mandatory'>[MANDATORY]</span> Submit with Firm Form 400, Form 320, FINTRAC, Form 372, RECO Ack, and the signed Ontario Standard Lease."
                                ]
                            }
                        ]
                    }
                ]
            }
        ];


        const App = () => {
            const [activeTrack, setActiveTrack] = useState('seller'); 
            const [openAccordion, setOpenAccordion] = useState(null);
            const [completedItems, setCompletedItems] = useState({});

            // Determine which data set to use
            let currentData;
            let themeConfig = {};

            switch(activeTrack) {
                case 'seller':
                    currentData = sellerData;
                    themeConfig = {
                        primary: 'emerald', bgDark: 'bg-slate-900', gradient: 'from-emerald-400 to-emerald-600', 
                        border: 'border-emerald-400', bgLight: 'bg-emerald-50/20', checkBg: 'bg-emerald-500 border-emerald-500'
                    };
                    break;
                case 'buyer_freehold':
                    currentData = buyerFreeholdData;
                    themeConfig = {
                        primary: 'blue', bgDark: 'bg-slate-800', gradient: 'from-blue-400 to-indigo-500', 
                        border: 'border-blue-400', bgLight: 'bg-blue-50/20', checkBg: 'bg-blue-500 border-blue-500'
                    };
                    break;
                case 'buyer_condo':
                    currentData = buyerCondoData;
                    themeConfig = {
                        primary: 'sky', bgDark: 'bg-slate-800', gradient: 'from-sky-400 to-blue-500', 
                        border: 'border-sky-400', bgLight: 'bg-sky-50/20', checkBg: 'bg-sky-500 border-sky-500'
                    };
                    break;
                case 'tenant':
                    currentData = tenantData;
                    themeConfig = {
                        primary: 'violet', bgDark: 'bg-slate-900', gradient: 'from-violet-400 to-purple-600', 
                        border: 'border-violet-400', bgLight: 'bg-violet-50/20', checkBg: 'bg-violet-500 border-violet-500'
                    };
                    break;
            }

            const toggleAccordion = (id) => {
                setOpenAccordion(openAccordion === id ? null : id);
            };

            const toggleCompletion = (id, e) => {
                e.stopPropagation();
                setCompletedItems(prev => ({
                    ...prev,
                    [id]: !prev[id]
                }));
            };

            // Progress Calculations
            const totalItems = currentData.reduce((acc, phase) => acc + phase.items.length, 0);
            const currentTrackIds = currentData.flatMap(phase => phase.items.map(item => item.id));
            const completedCount = currentTrackIds.filter(id => completedItems[id]).length;
            const progressPercentage = totalItems === 0 ? 0 : (completedCount / totalItems) * 100;

            useEffect(() => {
                lucide.createIcons();
            });

            return (
                <div className="min-h-screen pb-20">
                    {/* Header */}
                    <header className={`text-white pt-10 pb-6 px-6 shadow-2xl relative overflow-hidden transition-colors duration-500 ${themeConfig.bgDark}`}>
                        <div className={`absolute top-0 left-0 w-full h-1 bg-gradient-to-r ${themeConfig.gradient}`}></div>
                        <div className="max-w-6xl mx-auto relative z-10">
                            
                            <div className="flex items-center justify-between mb-8">
                                <div className="flex items-center space-x-4">
                                    <div className={`bg-${themeConfig.primary}-500 p-2 rounded-lg transition-colors duration-500`}>
                                        <i data-lucide="building-2" className="w-8 h-8 text-white"></i>
                                    </div>
                                    <div>
                                        <h1 className="text-3xl font-extrabold tracking-tight">Casora! Realty Inc.</h1>
                                        <p className={`text-${themeConfig.primary}-400 text-sm font-bold tracking-widest uppercase transition-colors duration-500`}>Command Center</p>
                                    </div>
                                </div>
                            </div>

                            {/* Track Selector Tabs */}
                            <div className="flex space-x-2 overflow-x-auto pb-2 custom-scrollbar">
                                <button onClick={() => {setActiveTrack('seller'); setOpenAccordion(null);}} className={`whitespace-nowrap px-5 py-3 rounded-t-xl font-bold text-sm transition-all flex items-center ${activeTrack === 'seller' ? 'bg-slate-100 text-slate-900 shadow-md border-b-4 border-emerald-500' : 'bg-white/5 text-white/70 hover:bg-white/10'}`}>
                                    <i data-lucide="home" className="w-4 h-4 mr-2"></i> List Property
                                </button>
                                <button onClick={() => {setActiveTrack('buyer_freehold'); setOpenAccordion(null);}} className={`whitespace-nowrap px-5 py-3 rounded-t-xl font-bold text-sm transition-all flex items-center ${activeTrack === 'buyer_freehold' ? 'bg-slate-100 text-slate-900 shadow-md border-b-4 border-blue-500' : 'bg-white/5 text-white/70 hover:bg-white/10'}`}>
                                    <i data-lucide="key" className="w-4 h-4 mr-2"></i> Buy Freehold
                                </button>
                                <button onClick={() => {setActiveTrack('buyer_condo'); setOpenAccordion(null);}} className={`whitespace-nowrap px-5 py-3 rounded-t-xl font-bold text-sm transition-all flex items-center ${activeTrack === 'buyer_condo' ? 'bg-slate-100 text-slate-900 shadow-md border-b-4 border-sky-500' : 'bg-white/5 text-white/70 hover:bg-white/10'}`}>
                                    <i data-lucide="building" className="w-4 h-4 mr-2"></i> Buy Condo
                                </button>
                                <button onClick={() => {setActiveTrack('tenant'); setOpenAccordion(null);}} className={`whitespace-nowrap px-5 py-3 rounded-t-xl font-bold text-sm transition-all flex items-center ${activeTrack === 'tenant' ? 'bg-slate-100 text-slate-900 shadow-md border-b-4 border-violet-500' : 'bg-white/5 text-white/70 hover:bg-white/10'}`}>
                                    <i data-lucide="user-check" className="w-4 h-4 mr-2"></i> Lease (Tenant)
                                </button>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto mt-6 px-4 sm:px-6">
                        
                        {/* Progress Tracker Widget */}
                        <div className="bg-white rounded-xl shadow-md p-6 mb-10 border border-slate-200 relative overflow-hidden">
                            <div className={`absolute top-0 right-0 p-6 opacity-5 transition-colors duration-500 text-${themeConfig.primary}-900`}>
                                <i data-lucide={activeTrack === 'seller' ? 'target' : activeTrack === 'tenant' ? 'check-square' : 'compass'} className="w-24 h-24"></i>
                            </div>
                            <div className="relative z-10 flex justify-between items-end mb-3">
                                <div>
                                    <h2 className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Active Workflow Completion</h2>
                                    <p className="text-2xl font-black text-slate-800 tracking-tight">{completedCount} <span className="text-base font-medium text-slate-400">/ {totalItems} Steps</span></p>
                                </div>
                                <div className={`font-black text-2xl transition-colors duration-500 text-${themeConfig.primary}-600`}>
                                    {Math.round(progressPercentage)}%
                                </div>
                            </div>
                            <div className="w-full bg-slate-100 rounded-full h-3 overflow-hidden shadow-inner relative z-10">
                                <div className={`h-3 rounded-full transition-all duration-700 ease-out bg-gradient-to-r ${themeConfig.gradient}`} style={{ width: `${progressPercentage}%` }}></div>
                            </div>
                        </div>

                        {/* Master Timeline Content */}
                        <div className="space-y-12">
                            {currentData.map((phaseData, phaseIdx) => (
                                <div key={phaseIdx} className="relative">
                                    
                                    {/* Phase Header */}
                                    <div className="mb-5">
                                        <h3 className="text-2xl font-black text-slate-800 tracking-tight">
                                            {phaseData.phase}
                                        </h3>
                                        <p className="text-slate-500 font-medium mt-1 text-base">{phaseData.description}</p>
                                    </div>
                                    
                                    {/* Items List */}
                                    <div className="space-y-4">
                                        {phaseData.items.map((item) => {
                                            const isOpen = openAccordion === item.id;
                                            const isCompleted = completedItems[item.id];

                                            return (
                                                <div key={item.id} className={`bg-white rounded-xl border-2 transition-all duration-300 ${isCompleted ? `${themeConfig.border} ${themeConfig.bgLight} shadow-sm` : 'border-slate-200 hover:border-slate-300 hover:shadow-md'}`}>
                                                    
                                                    {/* Item Header Bar */}
                                                    <div 
                                                        className="flex items-center justify-between p-4 cursor-pointer"
                                                        onClick={() => toggleAccordion(item.id)}
                                                    >
                                                        <div className="flex items-start space-x-4">
                                                            {/* Checkbox */}
                                                            <button 
                                                                onClick={(e) => toggleCompletion(item.id, e)}
                                                                className={`flex-shrink-0 mt-0.5 w-7 h-7 rounded-lg border-2 flex items-center justify-center transition-all duration-200 ${isCompleted ? `${themeConfig.checkBg} text-white shadow-sm scale-110` : `border-slate-300 bg-slate-50 text-transparent hover:border-${themeConfig.primary}-400`}`}
                                                            >
                                                                <i data-lucide="check" className="w-4 h-4 stroke-[3]"></i>
                                                            </button>
                                                            
                                                            <div>
                                                                <div className="flex flex-wrap items-center gap-2 mb-1">
                                                                    <div className={`p-1.5 rounded-md transition-colors duration-300 ${isCompleted ? `bg-${themeConfig.primary}-100 text-${themeConfig.primary}-600` : 'bg-slate-100 text-slate-600'}`}>
                                                                        <i data-lucide={item.icon} className="w-3.5 h-3.5"></i>
                                                                    </div>
                                                                    <h4 className={`text-lg font-bold tracking-tight transition-colors ${isCompleted ? 'text-slate-400 line-through' : 'text-slate-800'}`}>
                                                                        {item.title}
                                                                    </h4>
                                                                    <span className={`px-2 py-0.5 rounded-md text-[10px] font-bold uppercase tracking-wider ${item.color}`}>
                                                                        {item.badge}
                                                                    </span>
                                                                </div>
                                                                <p className="text-slate-500 text-sm font-medium leading-relaxed">{item.description}</p>
                                                            </div>
                                                        </div>
                                                        
                                                        <div className={`text-slate-400 transition-transform duration-300 flex-shrink-0 ${isOpen ? `rotate-180 text-${themeConfig.primary}-500` : ''}`}>
                                                            <i data-lucide="chevron-down" className="w-6 h-6"></i>
                                                        </div>
                                                    </div>

                                                    {/* Expanded Content (Tutorial/Script) */}
                                                    <div className={`accordion-content ${isOpen ? 'open' : 'closed'}`}>
                                                        <div className="p-5 sm:p-6 bg-slate-50/80 border-t-2 border-slate-100 rounded-b-xl">
                                                            
                                                            <div className="space-y-6">
                                                                {item.sections.map((section, sIdx) => (
                                                                    <div key={sIdx} className="bg-white p-5 rounded-xl border border-slate-200 shadow-sm">
                                                                        <h5 className="font-bold text-slate-800 mb-4 pb-2 border-b border-slate-100 flex items-center text-md">
                                                                            <i data-lucide="chevron-right-square" className={`w-4 h-4 mr-2 text-${themeConfig.primary}-500`}></i>
                                                                            {section.title}
                                                                        </h5>
                                                                        <ul className="space-y-3">
                                                                            {section.steps.map((step, idx) => (
                                                                                <li key={idx} className="flex items-start text-slate-700 text-[14px] leading-relaxed">
                                                                                    {/* Bullet Icons */}
                                                                                    <div className="mt-1 mr-3 flex-shrink-0">
                                                                                        {step.includes('tag-script') || step.includes('tag-ask') ? (
                                                                                             <i data-lucide="message-square" className="w-4 h-4 text-amber-500"></i>
                                                                                        ) : step.includes('tag-dd') ? (
                                                                                             <i data-lucide="shield-check" className="w-4 h-4 text-orange-500"></i>
                                                                                        ) : step.includes('Subject:') ? (
                                                                                             <i data-lucide="mail" className={`w-4 h-4 text-${themeConfig.primary}-500`}></i>
                                                                                        ) : (
                                                                                             <div className="w-1.5 h-1.5 rounded-full bg-slate-300 mt-1.5"></div>
                                                                                        )}
                                                                                    </div>
                                                                                    <span className="flex-1" dangerouslySetInnerHTML={{ __html: step }}></span>
                                                                                </li>
                                                                            ))}
                                                                        </ul>
                                                                    </div>
                                                                ))}
                                                            </div>

                                                        </div>
                                                    </div>

                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            ))}
                        </div>
                        
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
