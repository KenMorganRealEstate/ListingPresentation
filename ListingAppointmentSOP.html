                        "<span class='tag-mandatory'>[MANDATORY]</span> Section 2: Check 'Represents the Interests of the Buyer/Tenant'. Section 3: Fill Co‑op Commission (usually 1/2 month's rent)."
                    ]
                }]
            }, {
                id: "t_ontario_lease",
                title: "8. Ontario Residential Tenancy Agreement",
                badge: "Provincial Law",
                color: "bg-emerald-100 text-emerald-800",
                icon: "gavel",
                description: "The 'Standard Lease'. Mandatory in Ontario.",
                sections: [{
                    title: "Execution",
                    steps: [
                        "<span class='tag-mandatory'>[MANDATORY]</span> Once Form 400 is accepted, the Landlord MUST provide this Standard Lease to the Tenant. Most sections are mandatory, but additional terms can be added in Schedule A as long as they don't conflict with the Residential Tenancies Act.",
                        "<span class='tag-mandatory'>[MANDATORY]</span> Ensure Landlord Name, Tenant Name, Unit Address, and Rent match Form 400 perfectly.",
                        "<span class='tag-mandatory'>[MANDATORY]</span> Under the RTA, if the tenant requests the signed Standard Lease in writing and the landlord fails to provide it within 21 days, the tenant may withhold one month's rent. Inform your tenant-client of this right.",
                        "<span class='tag-optional'>[OPTIONAL]</span> Attach Schedule A from your Form 400 to the 'Additional Terms' section of this Standard Lease."
                    ]
                }]
            }, {
                id: "t_dealsummary",
                title: "9. CASORA Deal Summary",
                badge: "Internal Admin",
                color: "bg-purple-100 text-purple-800",
                icon: "briefcase",
                description: "Getting paid for the lease.",
                sections: [{
                    title: "Office Submission",
                    steps: [
                        "<span class='tag-mandatory'>[MANDATORY]</span> Type of Transaction: Check <strong>LEASE</strong>.",
                        "<span class='tag-mandatory'>[MANDATORY]</span> Casora Role: Check <strong>SELLING</strong>.",
                        "<span class='tag-mandatory'>[MANDATORY]</span> Submit with Firm Form 400, Form 320, FINTRAC, Form 372, RECO Ack, and the signed Ontario Standard Lease."
                    ]
                }]
            }]
        }];

        // ============================================================
        // MAIN APP COMPONENT
        // ============================================================
        const App = () => {
            const [activeTrack, setActiveTrack] = useState('list_freehold');
            const [openAccordion, setOpenAccordion] = useState(null);
            const [completedItems, setCompletedItems] = useState({});

            let currentData, themeConfig, headerTitle, trackIcon;

            switch (activeTrack) {
                case 'list_freehold':
                    currentData = listFreeholdData; headerTitle = 'List Freehold (Seller)'; trackIcon = 'home';
                    themeConfig = { primary: 'emerald', bgDark: 'bg-slate-900', gradient: 'from-emerald-400 to-emerald-600', border: 'border-emerald-400', bgLight: 'bg-emerald-50/20', checkBg: 'bg-emerald-500 border-emerald-500', accent: 'emerald' };
                    break;
                case 'list_condo':
                    currentData = listCondoData; headerTitle = 'List Condo (Seller)'; trackIcon = 'building';
                    themeConfig = { primary: 'emerald', bgDark: 'bg-slate-900', gradient: 'from-emerald-500 to-teal-600', border: 'border-teal-400', bgLight: 'bg-teal-50/20', checkBg: 'bg-teal-500 border-teal-500', accent: 'teal' };
                    break;
                case 'list_lease':
                    currentData = listLeaseData; headerTitle = 'List Lease (Landlord)'; trackIcon = 'key';
                    themeConfig = { primary: 'teal', bgDark: 'bg-slate-900', gradient: 'from-teal-400 to-cyan-500', border: 'border-teal-400', bgLight: 'bg-teal-50/20', checkBg: 'bg-teal-500 border-teal-500', accent: 'teal' };
                    break;
                case 'buy_freehold':
                    currentData = buyFreeholdData; headerTitle = 'Buy Freehold'; trackIcon = 'shopping-cart';
                    themeConfig = { primary: 'blue', bgDark: 'bg-slate-800', gradient: 'from-blue-400 to-indigo-500', border: 'border-blue-400', bgLight: 'bg-blue-50/20', checkBg: 'bg-blue-500 border-blue-500', accent: 'blue' };
                    break;
                case 'buy_condo':
                    currentData = buyCondoData; headerTitle = 'Buy Condo'; trackIcon = 'building';
                    themeConfig = { primary: 'sky', bgDark: 'bg-slate-800', gradient: 'from-sky-400 to-blue-500', border: 'border-sky-400', bgLight: 'bg-sky-50/20', checkBg: 'bg-sky-500 border-sky-500', accent: 'sky' };
                    break;
                case 'rep_tenant':
                    currentData = repTenantData; headerTitle = 'Rep Tenant (Renter)'; trackIcon = 'user-check';
                    themeConfig = { primary: 'violet', bgDark: 'bg-slate-900', gradient: 'from-violet-400 to-purple-600', border: 'border-violet-400', bgLight: 'bg-violet-50/20', checkBg: 'bg-violet-500 border-violet-500', accent: 'violet' };
                    break;
            }

            const toggleAccordion = (id) => setOpenAccordion(openAccordion === id ? null : id);
            const toggleCompletion = (id, e) => { e.stopPropagation(); setCompletedItems(prev => ({ ...prev, [id]: !prev[id] })); };

            const totalItems = currentData.reduce((acc, phase) => acc + phase.items.length, 0);
            const currentTrackIds = currentData.flatMap(phase => phase.items.map(item => item.id));
            const completedCount = currentTrackIds.filter(id => completedItems[id]).length;
            const progressPercentage = totalItems === 0 ? 0 : (completedCount / totalItems) * 100;

            useEffect(() => { setOpenAccordion(null); }, [activeTrack]);
            useEffect(() => { lucide.createIcons(); });

            const getTabClass = (trackId) => {
                const isActive = activeTrack === trackId;
                const base = 'whitespace-nowrap px-4 py-2.5 rounded-t-xl font-bold text-sm transition-all flex items-center ';
                if (isActive) {
                    const borderColor = trackId.startsWith('list_') ? (trackId === 'list_lease' ? 'border-teal-500' : 'border-emerald-500') : trackId === 'buy_freehold' ? 'border-blue-500' : trackId === 'buy_condo' ? 'border-sky-500' : 'border-violet-500';
                    return base + `bg-slate-100 text-slate-900 shadow-md border-b-4 ${borderColor}`;
                }
                return base + 'bg-white/5 text-white/70 hover:bg-white/10';
            };

            return (
                <div className="min-h-screen pb-20">
                    <header className={`text-white pt-10 pb-6 px-6 shadow-2xl relative overflow-hidden transition-colors duration-500 ${themeConfig.bgDark}`}>
                        <div className={`absolute top-0 left-0 w-full h-1 bg-gradient-to-r ${themeConfig.gradient}`}></div>
                        <div className="max-w-6xl mx-auto relative z-10">
                            <div className="flex items-center space-x-4 mb-8">
                                <div className={`bg-${themeConfig.primary}-500 p-2 rounded-lg`}>
                                    <i data-lucide="building-2" className="w-8 h-8 text-white"></i>
                                </div>
                                <div>
                                    <h1 className="text-3xl font-extrabold tracking-tight">Casora! Realty Inc.</h1>
                                    <p className={`text-${themeConfig.primary}-400 text-sm font-bold tracking-widest uppercase`}>Agency Command Center</p>
                                </div>
                            </div>
                            <div className="flex space-x-2 overflow-x-auto pb-2 custom-scrollbar">
                                <button onClick={() => setActiveTrack('list_freehold')} className={getTabClass('list_freehold')}><i data-lucide="home" className="w-4 h-4 mr-2"></i> List Freehold</button>
                                <button onClick={() => setActiveTrack('list_condo')} className={getTabClass('list_condo')}><i data-lucide="building" className="w-4 h-4 mr-2"></i> List Condo</button>
                                <button onClick={() => setActiveTrack('list_lease')} className={getTabClass('list_lease')}><i data-lucide="key" className="w-4 h-4 mr-2"></i> List Lease</button>
                                <div className="w-px bg-white/20 mx-2 self-stretch my-1"></div>
                                <button onClick={() => setActiveTrack('buy_freehold')} className={getTabClass('buy_freehold')}><i data-lucide="shopping-cart" className="w-4 h-4 mr-2"></i> Buy Freehold</button>
                                <button onClick={() => setActiveTrack('buy_condo')} className={getTabClass('buy_condo')}><i data-lucide="building" className="w-4 h-4 mr-2"></i> Buy Condo</button>
                                <button onClick={() => setActiveTrack('rep_tenant')} className={getTabClass('rep_tenant')}><i data-lucide="user-check" className="w-4 h-4 mr-2"></i> Rep Tenant</button>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto mt-6 px-4 sm:px-6">
                        <div className="bg-white rounded-xl shadow-md p-6 mb-10 border border-slate-200">
                            <h2 className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">{headerTitle} — Workflow Completion</h2>
                            <div className="flex justify-between items-end mb-3">
                                <p className="text-2xl font-black text-slate-800">{completedCount} <span className="text-base text-slate-400">/ {totalItems}</span></p>
                                <div className={`font-black text-2xl text-${themeConfig.primary}-600`}>{Math.round(progressPercentage)}%</div>
                            </div>
                            <div className="w-full bg-slate-100 rounded-full h-3"><div className={`h-3 rounded-full bg-gradient-to-r ${themeConfig.gradient}`} style={{ width: `${progressPercentage}%` }}></div></div>
                        </div>

                        <div className="space-y-12">
                            {currentData.map((phaseData, phaseIdx) => (
                                <div key={phaseIdx}>
                                    <div className="mb-5"><h3 className="text-2xl font-black text-slate-800">{phaseData.phase}</h3><p className="text-slate-500">{phaseData.description}</p></div>
                                    <div className="space-y-4">
                                        {phaseData.items.map((item) => {
                                            const isOpen = openAccordion === item.id;
                                            const isCompleted = completedItems[item.id];
                                            return (
                                                <div key={item.id} className={`bg-white rounded-xl border-2 transition-all ${isCompleted ? `${themeConfig.border} ${themeConfig.bgLight}` : 'border-slate-200 hover:border-slate-300'}`}>
                                                    <div className="flex items-center justify-between p-4 cursor-pointer" onClick={() => toggleAccordion(item.id)}>
                                                        <div className="flex items-start space-x-4">
                                                            <button onClick={(e) => toggleCompletion(item.id, e)} className={`w-7 h-7 rounded-lg border-2 flex items-center justify-center ${isCompleted ? `${themeConfig.checkBg} text-white` : `border-slate-300 text-transparent`}`}><i data-lucide="check" className="w-4 h-4 stroke-[3]"></i></button>
                                                            <div>
                                                                <div className="flex items-center gap-2 mb-1"><div className={`p-1.5 rounded-md ${isCompleted ? `bg-${themeConfig.primary}-100 text-${themeConfig.primary}-600` : 'bg-slate-100 text-slate-600'}`}><i data-lucide={item.icon} className="w-3.5 h-3.5"></i></div><h4 className={`text-lg font-bold ${isCompleted ? 'text-slate-400 line-through' : 'text-slate-800'}`}>{item.title}</h4><span className={`px-2 py-0.5 rounded-md text-[10px] font-bold uppercase ${item.color}`}>{item.badge}</span></div>
                                                                <p className="text-slate-500 text-sm font-medium leading-relaxed">{item.description}</p>
                                                            </div>
                                                        </div>
                                                        <i data-lucide="chevron-down" className={`w-6 h-6 text-slate-400 transition-transform ${isOpen ? `rotate-180 text-${themeConfig.primary}-500` : ''}`}></i>
                                                    </div>
                                                    <div className={`accordion-content ${isOpen ? 'open' : 'closed'}`}>
                                                        <div className="p-5 bg-slate-50/80 border-t-2 border-slate-100 rounded-b-xl">
                                                            <div className="space-y-6">
                                                                {item.sections.map((section, sIdx) => (
                                                                    <div key={sIdx} className="bg-white p-5 rounded-xl border border-slate-200 shadow-sm"><h5 className="font-bold text-slate-800 mb-4 pb-2 border-b border-slate-100">{section.title}</h5><ul className="space-y-3">{section.steps.map((step, idx) => (<li key={idx} className="flex items-start text-slate-700 text-[14px]" dangerouslySetInnerHTML={{ __html: step }}></li>))}</ul></div>
                                                                ))}
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </main>
                    <footer className="text-center text-slate-400 text-xs py-8 mt-10">
                        <p>Casora! Realty Inc. — Agency Command Center — For internal use only. Always consult your Broker of Record if unsure.</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
