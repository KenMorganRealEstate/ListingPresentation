<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casora! Realty Inc. - Agency Command Center</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel for JSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f1f5f9; }
        .accordion-content { transition: max-height 0.4s ease-in-out, opacity 0.4s ease-in-out; overflow: hidden; }
        .accordion-content.open { max-height: 8000px; opacity: 1; }
        .accordion-content.closed { max-height: 0; opacity: 0; }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        .tag-mandatory { background-color: #fee2e2; color: #991b1b; padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; font-weight: 800; margin-right: 6px; vertical-align: middle; display: inline-block;}
        .tag-optional { background-color: #f1f5f9; color: #475569; padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; font-weight: 800; margin-right: 6px; vertical-align: middle; display: inline-block;}
        .tag-ask { background-color: #fef3c7; color: #92400e; padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; font-weight: 800; margin-right: 6px; vertical-align: middle; display: inline-block;}
        .tag-script { background-color: #dbeafe; color: #1e40af; padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; font-weight: 800; margin-right: 6px; vertical-align: middle; display: inline-block;}
        .tag-dd { background-color: #fef08a; color: #854d0e; padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; font-weight: 800; margin-right: 6px; vertical-align: middle; display: inline-block;}
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // ==========================================
        // 1. LISTING TRACKS (SELLER / LANDLORD)
        // ==========================================

        const listFreeholdData = [
            {
                phase: "Phase 1: Pre-Listing Research",
                description: "Handling TRESA compliance and legal due diligence.",
                items: [
                    {
                        id: "lf_dd", title: "1. Pre-Listing Due Diligence", badge: "Office Research", color: "bg-orange-100 text-orange-800", icon: "search",
                        sections: [{ title: "Title Verification", steps: ["<span class='tag-dd'>[DUE DILIGENCE]</span> Pull GeoWarehouse to verify exact legal names on title.", "<span class='tag-dd'>[DUE DILIGENCE]</span> Estates/POA: MUST obtain Certificate of Appointment of Estate Trustee or POA document."] }]
                    },
                    {
                        id: "lf_email", title: "2. Advance Email & RECO Delivery", badge: "Script", color: "bg-indigo-100 text-indigo-800", icon: "mail",
                        sections: [{ title: "Email Template", steps: ["<span class='tag-mandatory'>[MANDATORY]</span> Email RECO Guide 24hrs before meeting.", "<div class='bg-white border p-3 rounded mt-2 text-sm italic'>Subject: Looking forward to our meeting... I am required by law to provide you with the attached RECO Information Guide...</div>"] }]
                    }
                ]
            },
            {
                phase: "Phase 2: The Kitchen Table",
                description: "Secure wet-ink signatures to lock in the listing.",
                items: [
                    {
                        id: "lf_form271", title: "3. OREA Form 271 - Seller Representation", badge: "Contract", color: "bg-amber-100 text-amber-800", icon: "file-signature",
                        sections: [{ title: "Key Fields", steps: ["<span class='tag-mandatory'>[MANDATORY]</span> Designated Rep: Your exact name.", "<span class='tag-dd'>[DUE DILIGENCE]</span> <span class='tag-ask'>[ASK SELLER]</span> Spousal Consent: Matrimonial home? Non-titled spouse must sign Page 4."] }]
                    },
                    {
                        id: "lf_fintrac", title: "4. FINTRAC ID Records", badge: "Compliance", color: "bg-amber-100 text-amber-800", icon: "fingerprint",
                        sections: [{ title: "Verification", steps: ["<span class='tag-mandatory'>[MANDATORY]</span> Verify physical ID. Check 'Residential Property' and 'Sale'."] }]
                    },
                    {
                        id: "lf_form244", title: "5. Form 244 & Lockbox Direction", badge: "Contract", color: "bg-amber-100 text-amber-800", icon: "lock",
                        sections: [{ title: "Offer Strategy", steps: ["<span class='tag-mandatory'>[MANDATORY]</span> Form 244 is required if holding offers.", "<span class='tag-mandatory'>[MANDATORY]</span> Get Lockbox Authorization signed."] }]
                    },
                    {
                        id: "lf_form161", title: "6. Form 161 (Disclosure of Interest)", badge: "Conditional", color: "bg-red-100 text-red-800", icon: "alert-triangle",
                        sections: [{ title: "Usage", steps: ["<span class='tag-mandatory'>[MANDATORY]</span> Must use if YOU/Brokerage own the property."] }]
                    }
                ]
            },
            {
                phase: "Phase 3: Back-Office & MLS",
                description: "Drafting the MLS data and Casora paperwork.",
                items: [
                    {
                        id: "lf_mls", title: "7. PropTx 290 & BrokerBay", badge: "Digital", color: "bg-blue-100 text-blue-800", icon: "monitor",
                        sections: [{ title: "Setup", steps: ["<span class='tag-mandatory'>[MANDATORY]</span> Use PropTx 290 (Freehold Sale). Send to seller via DocuSign."] }]
                    },
                    {
                        id: "lf_dealsummary", title: "8. CASORA Deal Summary", badge: "Admin", color: "bg-purple-100 text-purple-800", icon: "briefcase",
                        sections: [{ title: "Firm Deal", steps: ["<span class='tag-mandatory'>[MANDATORY]</span> Submit when deal is FIRM to get paid."] }]
                    }
                ]
            }
        ];

        const listCondoData = [
            {
                phase: "Phase 1: Pre-Listing Condo Research",
                description: "Condos require specific data upfront.",
                items: [
                    {
                        id: "lc_dd", title: "1. Condo Due Diligence", badge: "Office Research", color: "bg-orange-100 text-orange-800", icon: "search",
                        sections: [{ title: "Verifications", steps: ["<span class='tag-dd'>[DUE DILIGENCE]</span> GeoWarehouse: Find Condominium Plan No. and Corp Name.", "<span class='tag-dd'>[DUE DILIGENCE]</span> Parking/Locker: Verify if owned or exclusive use."] }]
                    },
                    {
                        id: "lc_email", title: "2. RECO Guide Delivery", badge: "Compliance", color: "bg-indigo-100 text-indigo-800", icon: "mail",
                        sections: [{ title: "Delivery", steps: ["<span class='tag-mandatory'>[MANDATORY]</span> Email RECO Guide 24hrs before meeting."] }]
                    }
                ]
            },
            {
                phase: "Phase 2: Condo Contracts",
                description: "Securing the listing.",
                items: [
                    {
                        id: "lc_form271", title: "3. OREA Form 271", badge: "Contract", color: "bg-amber-100 text-amber-800", icon: "file-signature",
                        sections: [{ title: "Key Fields", steps: ["<span class='tag-mandatory'>[MANDATORY]</span> Designated Rep: Your exact name."] }]
                    },
                    {
                        id: "lc_fintrac", title: "4. FINTRAC ID", badge: "Compliance", color: "bg-amber-100 text-amber-800", icon: "fingerprint",
                        sections: [{ title: "Verification", steps: ["<span class='tag-mandatory'>[MANDATORY]</span> Verify physical ID."] }]
                    }
                ]
            },
            {
                phase: "Phase 3: Condo MLS Data",
                description: "Using the specific Condo forms.",
                items: [
                    {
                        id: "lc_mls", title: "5. PropTx 291 & BrokerBay", badge: "Digital", color: "bg-blue-100 text-blue-800", icon: "building",
                        sections: [{ title: "Condo Setup", steps: ["<span class='tag-mandatory'>[MANDATORY]</span> Use PropTx 291 (Condo Sale).", "<span class='tag-mandatory'>[MANDATORY]</span> Must list Condo Corp Name, Maintenance Fee amount, and what is included."] }]
                    },
                    {
                        id: "lc_dealsummary", title: "6. CASORA Deal Summary", badge: "Admin", color: "bg-purple-100 text-purple-800", icon: "briefcase",
                        sections: [{ title: "Firm Deal", steps: ["<span class='tag-mandatory'>[MANDATORY]</span> Submit when deal is FIRM (after Status Cert waiver)."] }]
                    }
                ]
            }
        ];

        const listLeaseData = [
            {
                phase: "Phase 1: Landlord Agency",
                description: "Representing a Landlord.",
                items: [
                    {
                        id: "ll_email", title: "1. RECO Guide Delivery", badge: "Compliance", color: "bg-indigo-100 text-indigo-800", icon: "mail",
                        sections: [{ title: "Delivery", steps: ["<span class='tag-mandatory'>[MANDATORY]</span> TRESA applies to leases. Email RECO guide."] }]
                    },
                    {
                        id: "ll_form272", title: "2. OREA Form 272 - Landlord Rep", badge: "Contract", color: "bg-amber-100 text-amber-800", icon: "file-signature",
                        sections: [{ title: "Lease Listing", steps: ["<span class='tag-mandatory'>[MANDATORY]</span> This is Authority to Offer for LEASE.", "<span class='tag-mandatory'>[MANDATORY]</span> Commission usually stated as 'One month's rent'."] }]
                    }
                ]
            },
            {
                phase: "Phase 2: Lease MLS Data",
                description: "Inputting the rental listing.",
                items: [
                    {
                        id: "ll_mls", title: "3. PropTx 296 & BrokerBay", badge: "Digital", color: "bg-blue-100 text-blue-800", icon: "monitor",
                        sections: [{ title: "Setup", steps: ["<span class='tag-mandatory'>[MANDATORY]</span> Use PropTx 296 (Freehold Lease).", "<span class='tag-mandatory'>[MANDATORY]</span> Note in remarks what documents are required (Credit check, employment letter)."] }]
                    }
                ]
            },
            {
                phase: "Phase 3: Deal Completion (Lease)",
                description: "Accepting a tenant.",
                items: [
                    {
                        id: "ll_dealsummary", title: "4. CASORA Deal Summary & OSL", badge: "Admin", color: "bg-purple-100 text-purple-800", icon: "briefcase",
                        sections: [{ title: "Firm Deal", steps: ["<span class='tag-mandatory'>[MANDATORY]</span> Landlord MUST execute the Ontario Standard Lease with Tenant.", "<span class='tag-mandatory'>[MANDATORY]</span> Submit Deal Summary marked as 'Lease'."] }]
                    }
                ]
            }
        ];

        // ==========================================
        // 2. BUYER TRACKS
        // ==========================================

        const buyFreeholdData = [
            {
                phase: "Phase 1: Freehold Buyer Agency",
                description: "Establishing the relationship.",
                items: [
                    {
                        id: "bf_reco", title: "1. RECO Guide & Agency", badge: "Dialogue", color: "bg-indigo-100 text-indigo-800", icon: "book-open",
                        sections: [{ title: "Conversation", steps: ["<span class='tag-script'>[SCRIPT]</span> 'TRESA requires me to explain representation...'", "<span class='tag-mandatory'>[MANDATORY]</span> Buyer signs Page 13."] }]
                    },
                    {
                        id: "bf_form371", title: "2. Form 371 - Buyer Rep", badge: "Contract", color: "bg-amber-100 text-amber-800", icon: "file-signature",
                        sections: [{ title: "Scope", steps: ["<span class='tag-mandatory'>[MANDATORY]</span> Property Type: 'Single Family Residential / Freehold'."] }]
                    }
                ]
            },
            {
                phase: "Phase 2: Drafting the Freehold Offer",
                description: "Writing the APS.",
                items: [
                    {
                        id: "bf_form100", title: "3. Form 100 - APS (Residential)", badge: "Core Contract", color: "bg-blue-100 text-blue-800", icon: "file-text",
                        sections: [{ title: "Key Fields", steps: ["<span class='tag-mandatory'>[MANDATORY]</span> Deposit payable to Listing Brokerage Trust Account.", "<span class='tag-mandatory'>[MANDATORY]</span> List chattels explicitly."] }]
                    },
                    {
                        id: "bf_form127", title: "4. Form 127 - Buyer Ack", badge: "CYA Form", color: "bg-red-100 text-red-800", icon: "shield-alert",
                        sections: [{ title: "Protection", steps: ["<span class='tag-mandatory'>[MANDATORY]</span> Must sign if writing a Firm offer (waiving inspection)."] }]
                    }
                ]
            },
            {
                phase: "Phase 3: Deal Completion",
                description: "Handling commissions.",
                items: [
                    {
                        id: "bf_form320", title: "5. Form 320 - Co-op", badge: "Contract", color: "bg-emerald-100 text-emerald-800", icon: "handshake",
                        sections: [{ title: "Commission", steps: ["<span class='tag-mandatory'>[MANDATORY]</span> Check 'Represents Interests of Buyer'."] }]
                    },
                    {
                        id: "bf_dealsummary", title: "6. CASORA Deal Summary", badge: "Admin", color: "bg-purple-100 text-purple-800", icon: "briefcase",
                        sections: [{ title: "Submission", steps: ["<span class='tag-mandatory'>[MANDATORY]</span> Submit to Casora with Firm APS, Form 320, FINTRAC, Form 124."] }]
                    }
                ]
            }
        ];

        const buyCondoData = [
            {
                phase: "Phase 1: Condo Buyer Agency",
                description: "Condo specific representation.",
                items: [
                    {
                        id: "bc_form371", title: "1. Form 371 - Buyer Rep", badge: "Contract", color: "bg-amber-100 text-amber-800", icon: "file-signature",
                        sections: [{ title: "Scope", steps: ["<span class='tag-mandatory'>[MANDATORY]</span> Property Type: 'Residential Condominium'."] }]
                    }
                ]
            },
            {
                phase: "Phase 2: Drafting the Condo Offer",
                description: "Using Form 101.",
                items: [
                    {
                        id: "bc_form101", title: "2. Form 101 - APS (Condo)", badge: "Condo APS", color: "bg-blue-100 text-blue-800", icon: "building",
                        sections: [{ title: "Condo Specifics", steps: ["<span class='tag-mandatory'>[MANDATORY]</span> Must list Condo Corp Name.", "<span class='tag-mandatory'>[MANDATORY]</span> Specify if Parking is Owned or Exclusive Use.", "<span class='tag-mandatory'>[MANDATORY]</span> MUST include Status Certificate condition."] }]
                    }
                ]
            },
            {
                phase: "Phase 3: Deal Completion",
                description: "Firming up the condo.",
                items: [
                    {
                        id: "bc_dealsummary", title: "3. CASORA Deal Summary", badge: "Admin", color: "bg-purple-100 text-purple-800", icon: "briefcase",
                        sections: [{ title: "Submission", steps: ["<span class='tag-mandatory'>[MANDATORY]</span> Submit to Casora after Status Cert is waived (Form 124)."] }]
                    }
                ]
            }
        ];

        const buyLeaseData = [
            {
                phase: "Phase 1: Tenant Agency",
                description: "Representing a Renter.",
                items: [
                    {
                        id: "bl_form372", title: "1. Form 372 - Tenant Rep", badge: "Contract", color: "bg-amber-100 text-amber-800", icon: "file-signature",
                        sections: [{ title: "Scope", steps: ["<span class='tag-mandatory'>[MANDATORY]</span> Commission usually paid by Landlord."] }]
                    }
                ]
            },
            {
                phase: "Phase 2: Drafting Lease Offer",
                description: "Using Form 400.",
                items: [
                    {
                        id: "bl_form400", title: "2. Form 400 - Agreement to Lease", badge: "Offer", color: "bg-blue-100 text-blue-800", icon: "file-text",
                        sections: [{ title: "Terms", steps: ["<span class='tag-mandatory'>[MANDATORY]</span> Deposit is usually First and Last month's rent."] }]
                    }
                ]
            },
            {
                phase: "Phase 3: Standard Lease",
                description: "Provincial compliance.",
                items: [
                    {
                        id: "bl_osl", title: "3. Ontario Standard Lease", badge: "Law", color: "bg-emerald-100 text-emerald-800", icon: "gavel",
                        sections: [{ title: "Execution", steps: ["<span class='tag-mandatory'>[MANDATORY]</span> Landlord MUST provide this. Ensure details match Form 400."] }]
                    },
                    {
                        id: "bl_dealsummary", title: "4. CASORA Deal Summary", badge: "Admin", color: "bg-purple-100 text-purple-800", icon: "briefcase",
                        sections: [{ title: "Submission", steps: ["<span class='tag-mandatory'>[MANDATORY]</span> Check 'Lease' and 'Selling'."] }]
                    }
                ]
            }
        ];

        const App = () => {
            const [activeTrack, setActiveTrack] = useState('list_freehold'); 
            const [openAccordion, setOpenAccordion] = useState(null);
            const [completedItems, setCompletedItems] = useState({});

            // Logic Switcher
            let currentData, themeConfig, headerTitle;

            switch(activeTrack) {
                case 'list_freehold':
                    currentData = listFreeholdData; headerTitle = "Listing Freehold";
                    themeConfig = { primary: 'emerald', bgDark: 'bg-slate-900', gradient: 'from-emerald-400 to-emerald-600', border: 'border-emerald-400', bgLight: 'bg-emerald-50/20', checkBg: 'bg-emerald-500 border-emerald-500' };
                    break;
                case 'list_condo':
                    currentData = listCondoData; headerTitle = "Listing Condo";
                    themeConfig = { primary: 'emerald', bgDark: 'bg-slate-900', gradient: 'from-emerald-500 to-teal-600', border: 'border-emerald-400', bgLight: 'bg-emerald-50/20', checkBg: 'bg-emerald-500 border-emerald-500' };
                    break;
                case 'list_lease':
                    currentData = listLeaseData; headerTitle = "Listing Lease (Landlord)";
                    themeConfig = { primary: 'emerald', bgDark: 'bg-slate-900', gradient: 'from-teal-400 to-emerald-500', border: 'border-teal-400', bgLight: 'bg-teal-50/20', checkBg: 'bg-teal-500 border-teal-500' };
                    break;
                case 'buy_freehold':
                    currentData = buyFreeholdData; headerTitle = "Buying Freehold";
                    themeConfig = { primary: 'blue', bgDark: 'bg-slate-800', gradient: 'from-blue-400 to-indigo-500', border: 'border-blue-400', bgLight: 'bg-blue-50/20', checkBg: 'bg-blue-500 border-blue-500' };
                    break;
                case 'buy_condo':
                    currentData = buyCondoData; headerTitle = "Buying Condo";
                    themeConfig = { primary: 'sky', bgDark: 'bg-slate-800', gradient: 'from-sky-400 to-blue-500', border: 'border-sky-400', bgLight: 'bg-sky-50/20', checkBg: 'bg-sky-500 border-sky-500' };
                    break;
                case 'buy_lease':
                    currentData = buyLeaseData; headerTitle = "Representing Tenant";
                    themeConfig = { primary: 'violet', bgDark: 'bg-slate-900', gradient: 'from-violet-400 to-purple-600', border: 'border-violet-400', bgLight: 'bg-violet-50/20', checkBg: 'bg-violet-500 border-violet-500' };
                    break;
            }

            const toggleAccordion = (id) => setOpenAccordion(openAccordion === id ? null : id);
            const toggleCompletion = (id, e) => { e.stopPropagation(); setCompletedItems(prev => ({ ...prev, [id]: !prev[id] })); };

            const totalItems = currentData.reduce((acc, phase) => acc + phase.items.length, 0);
            const currentTrackIds = currentData.flatMap(phase => phase.items.map(item => item.id));
            const completedCount = currentTrackIds.filter(id => completedItems[id]).length;
            const progressPercentage = totalItems === 0 ? 0 : (completedCount / totalItems) * 100;

            useEffect(() => { lucide.createIcons(); });

            return (
                <div className="min-h-screen pb-20">
                    <header className={`text-white pt-10 pb-6 px-6 shadow-2xl relative overflow-hidden transition-colors duration-500 ${themeConfig.bgDark}`}>
                        <div className={`absolute top-0 left-0 w-full h-1 bg-gradient-to-r ${themeConfig.gradient}`}></div>
                        <div className="max-w-6xl mx-auto relative z-10">
                            <div className="flex items-center space-x-4 mb-8">
                                <div className={`bg-${themeConfig.primary}-500 p-2 rounded-lg`}>
                                    <i data-lucide="building-2" className="w-8 h-8 text-white"></i>
                                </div>
                                <div>
                                    <h1 className="text-3xl font-extrabold tracking-tight">Casora! Realty Inc.</h1>
                                    <p className={`text-${themeConfig.primary}-400 text-sm font-bold tracking-widest uppercase`}>Agency Command Center</p>
                                </div>
                            </div>

                            {/* 6-Track Selector */}
                            <div className="flex space-x-2 overflow-x-auto pb-2 custom-scrollbar">
                                <button onClick={() => {setActiveTrack('list_freehold'); setOpenAccordion(null);}} className={`whitespace-nowrap px-4 py-2 rounded-t-xl font-bold text-sm flex items-center ${activeTrack === 'list_freehold' ? 'bg-slate-100 text-slate-900 border-b-4 border-emerald-500' : 'bg-white/5 text-white/70 hover:bg-white/10'}`}><i data-lucide="home" className="w-4 h-4 mr-2"></i> List Freehold</button>
                                <button onClick={() => {setActiveTrack('list_condo'); setOpenAccordion(null);}} className={`whitespace-nowrap px-4 py-2 rounded-t-xl font-bold text-sm flex items-center ${activeTrack === 'list_condo' ? 'bg-slate-100 text-slate-900 border-b-4 border-emerald-500' : 'bg-white/5 text-white/70 hover:bg-white/10'}`}><i data-lucide="building" className="w-4 h-4 mr-2"></i> List Condo</button>
                                <button onClick={() => {setActiveTrack('list_lease'); setOpenAccordion(null);}} className={`whitespace-nowrap px-4 py-2 rounded-t-xl font-bold text-sm flex items-center ${activeTrack === 'list_lease' ? 'bg-slate-100 text-slate-900 border-b-4 border-teal-500' : 'bg-white/5 text-white/70 hover:bg-white/10'}`}><i data-lucide="key" className="w-4 h-4 mr-2"></i> List Lease</button>
                                
                                <div className="w-4 border-l border-white/20 mx-2"></div>

                                <button onClick={() => {setActiveTrack('buy_freehold'); setOpenAccordion(null);}} className={`whitespace-nowrap px-4 py-2 rounded-t-xl font-bold text-sm flex items-center ${activeTrack === 'buy_freehold' ? 'bg-slate-100 text-slate-900 border-b-4 border-blue-500' : 'bg-white/5 text-white/70 hover:bg-white/10'}`}><i data-lucide="shopping-cart" className="w-4 h-4 mr-2"></i> Buy Freehold</button>
                                <button onClick={() => {setActiveTrack('buy_condo'); setOpenAccordion(null);}} className={`whitespace-nowrap px-4 py-2 rounded-t-xl font-bold text-sm flex items-center ${activeTrack === 'buy_condo' ? 'bg-slate-100 text-slate-900 border-b-4 border-sky-500' : 'bg-white/5 text-white/70 hover:bg-white/10'}`}><i data-lucide="building" className="w-4 h-4 mr-2"></i> Buy Condo</button>
                                <button onClick={() => {setActiveTrack('buy_lease'); setOpenAccordion(null);}} className={`whitespace-nowrap px-4 py-2 rounded-t-xl font-bold text-sm flex items-center ${activeTrack === 'buy_lease' ? 'bg-slate-100 text-slate-900 border-b-4 border-violet-500' : 'bg-white/5 text-white/70 hover:bg-white/10'}`}><i data-lucide="user-check" className="w-4 h-4 mr-2"></i> Rep Tenant</button>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto mt-6 px-4 sm:px-6">
                        <div className="bg-white rounded-xl shadow-md p-6 mb-10 border border-slate-200">
                            <h2 className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">{headerTitle} Progress</h2>
                            <div className="flex justify-between items-end mb-3">
                                <p className="text-2xl font-black text-slate-800">{completedCount} <span className="text-base text-slate-400">/ {totalItems}</span></p>
                                <div className={`font-black text-2xl text-${themeConfig.primary}-600`}>{Math.round(progressPercentage)}%</div>
                            </div>
                            <div className="w-full bg-slate-100 rounded-full h-3"><div className={`h-3 rounded-full bg-gradient-to-r ${themeConfig.gradient}`} style={{ width: `${progressPercentage}%` }}></div></div>
                        </div>

                        <div className="space-y-12">
                            {currentData.map((phaseData, phaseIdx) => (
                                <div key={phaseIdx}>
                                    <div className="mb-5"><h3 className="text-2xl font-black text-slate-800">{phaseData.phase}</h3><p className="text-slate-500">{phaseData.description}</p></div>
                                    <div className="space-y-4">
                                        {phaseData.items.map((item) => {
                                            const isOpen = openAccordion === item.id;
                                            const isCompleted = completedItems[item.id];
                                            return (
                                                <div key={item.id} className={`bg-white rounded-xl border-2 transition-all ${isCompleted ? `${themeConfig.border} ${themeConfig.bgLight}` : 'border-slate-200 hover:border-slate-300'}`}>
                                                    <div className="flex items-center justify-between p-4 cursor-pointer" onClick={() => toggleAccordion(item.id)}>
                                                        <div className="flex items-start space-x-4">
                                                            <button onClick={(e) => toggleCompletion(item.id, e)} className={`w-7 h-7 rounded-lg border-2 flex items-center justify-center ${isCompleted ? `${themeConfig.checkBg} text-white` : `border-slate-300 text-transparent`}`}><i data-lucide="check" className="w-4 h-4 stroke-[3]"></i></button>
                                                            <div>
                                                                <div className="flex items-center gap-2 mb-1"><div className={`p-1.5 rounded-md ${isCompleted ? `bg-${themeConfig.primary}-100 text-${themeConfig.primary}-600` : 'bg-slate-100 text-slate-600'}`}><i data-lucide={item.icon} className="w-3.5 h-3.5"></i></div><h4 className={`text-lg font-bold ${isCompleted ? 'text-slate-400 line-through' : 'text-slate-800'}`}>{item.title}</h4><span className={`px-2 py-0.5 rounded-md text-[10px] font-bold uppercase ${item.color}`}>{item.badge}</span></div>
                                                            </div>
                                                        </div>
                                                        <i data-lucide="chevron-down" className={`w-6 h-6 text-slate-400 transition-transform ${isOpen ? `rotate-180 text-${themeConfig.primary}-500` : ''}`}></i>
                                                    </div>
                                                    <div className={`accordion-content ${isOpen ? 'open' : 'closed'}`}>
                                                        <div className="p-5 bg-slate-50/80 border-t-2 border-slate-100 rounded-b-xl">
                                                            <div className="space-y-6">
                                                                {item.sections.map((section, sIdx) => (
                                                                    <div key={sIdx} className="bg-white p-5 rounded-xl border border-slate-200 shadow-sm"><h5 className="font-bold text-slate-800 mb-4 pb-2 border-b border-slate-100">{section.title}</h5><ul className="space-y-3">{section.steps.map((step, idx) => (<li key={idx} className="flex items-start text-slate-700 text-[14px]"><span className="flex-1" dangerouslySetInnerHTML={{ __html: step }}></span></li>))}</ul></div>
                                                                ))}
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
