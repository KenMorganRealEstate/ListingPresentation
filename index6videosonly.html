    <script>
        const checkTailwind = setInterval(() => {
            if (typeof tailwind !== 'undefined') {
                tailwind.config = {
                    theme: {
                        extend: {
                            fontFamily: {
                                tech: ['Space Grotesk', 'sans-serif'],
                            },
                            colors: {
                                navy: '#061024',
                                chartreuse: '#D4FF00',

                    }
                };
                clearInterval(checkTailwind);
            }
        }, 50);
        setTimeout(() => clearInterval(checkTailwind), 5000);

    <style>
        body {

            color: #F8FAFC;

        /* Global Header for Logos */
        #global-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 2rem 4rem;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;

            color: transparent;
            font-size: 0;
        }

        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.6s ease-in-out, visibility 0.6s ease-in-out;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #061024;
        }

        .slide.active {
            opacity: 1;
            visibility: visible;
            z-index: 10;
        }

        /* Image Presentation Slide */
        .slide-img {
            width: 100vw;
            height: 100vh;
            object-fit: contain;
            object-position: center;
            z-index: 1;
        }

        /* Video Presentation Slide */
        .slide-video {
            width: 100vw;
            height: 100vh;
            object-fit: contain;
            object-position: center;
            z-index: 1;
        }

        /* Navigation Controls */
        #controls {
            position: fixed;
            bottom: 30px;
            right: 40px;
            z-index: 100;
            display: flex;
            gap: 15px;
            opacity: 0.3;
            transition: opacity 0.3s ease;
        }

        #controls:hover {
            opacity: 1;
        }

        .nav-btn {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            backdrop-filter: blur(5px);
            transition: all 0.2s ease;
        }

        .nav-btn:hover {

            color: #061024;
            border-color: #D4FF00;
        }

        /* Global Footer for Contact Info */

            bottom: 0;
            left: 0;
            width: 100%;
            padding: 1.5rem;
            text-align: center;
            z-index: 20;
            pointer-events: none;
        }
        
        /* Progress Bar */

            position: fixed;
            top: 0;
            left: 0;
            height: 4px;
            background-color: #D4FF00;
            z-index: 1000;
            transition: width 0.3s ease;
            box-shadow: 0 0 10px #D4FF00;
        }

        .tech-font {
            font-family: 'Space Grotesk', sans-serif;
            letter-spacing: 0.05em;
        }
    </style>

            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const slides = document.querySelectorAll('.slide');
            const progressBar = document.getElementById('progress-bar');
            
            let currentSlide = 0;
            const totalSlides = slides.length;

            function updateSlide() {
                // Pause all videos and remove active state
                slides.forEach((slide, index) => {
                    slide.classList.remove('active');
                    const video = slide.querySelector('video');
                    if (video) {
                        video.pause();
                        // Reset non-active videos back to the start so they are ready
                        if (index !== currentSlide) {
                            video.currentTime = 0; 
                        }
                    }
                });
                
                // Activate current slide
                slides[currentSlide].classList.add('active');
                
                // Play the newly active video
                const activeVideo = slides[currentSlide].querySelector('video');
                if (activeVideo) {
                    activeVideo.currentTime = 0; // Ensure it starts from the beginning
                    activeVideo.play().catch(err => {
                        console.log("Autoplay may be prevented by browser:", err.message);
                    });
                }

                // Update the progress bar
                const progress = ((currentSlide) / (totalSlides - 1)) * 100;
                progressBar.style.width = `${progress}%`;
            }

            function nextSlide() {
                if (currentSlide < totalSlides - 1) {
                    currentSlide++;
                    updateSlide();
                }
            }

            function prevSlide() {
                if (currentSlide > 0) {
                    currentSlide--;
                    updateSlide();
                }
            }

            function toggleFullScreen() {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen().catch(err => {
                        console.log(`Error attempting to enable fullscreen: ${err.message}`);
                    });
                } else {
                    if (document.exitFullscreen) {
                        document.exitFullscreen();
                    }
                }
            }

            // Event Listeners
            document.getElementById('btn-next').addEventListener('click', nextSlide);
            document.getElementById('btn-prev').addEventListener('click', prevSlide);
            document.getElementById('btn-fullscreen').addEventListener('click', toggleFullScreen);

            document.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowRight' || e.key === ' ' || e.code === 'Space' || e.key === 'Enter') {
                    nextSlide();
                } else if (e.key === 'ArrowLeft') {
                    prevSlide();
                }
            });

            let touchStartX = 0;
            let touchEndX = 0;

            document.addEventListener('touchstart', e => {
                touchStartX = e.changedTouches[0].screenX;
            });

            document.addEventListener('touchend', e => {
                touchEndX = e.changedTouches[0].screenX;
                handleSwipe();
            });

            function handleSwipe() {
                const swipeThreshold = 50; 
                if (touchEndX < touchStartX - swipeThreshold) {
                    nextSlide(); 
                }
                if (touchEndX > touchStartX + swipeThreshold) {
                    prevSlide(); 
                }
            }

            // Initial call to set up and play the first slide
            updateSlide();
        });
    </script>
