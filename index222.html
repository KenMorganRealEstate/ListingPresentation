    <!-- Smart Fallback Tailwind CSS: Tries local offline file first, falls back to CDN if online/missing -->
    <script src="tailwindcss.js" onerror="this.onerror=null; this.src='https://cdn.tailwindcss.com';"></script>
    <script>
        // Safeguard to prevent ReferenceError: Waits until Tailwind is fully loaded to apply the configuration
        const checkTailwind = setInterval(() => {
            if (typeof tailwind !== 'undefined') {
                tailwind.config = {
                    theme: {
                        extend: {
                            fontFamily: {
                                tech: ['Space Grotesk', 'sans-serif'],
                            },
                            colors: {
                                navy: '#061024',
                                chartreuse: '#D4FF00',
                            }
                        }
                    }
                };
                clearInterval(checkTailwind);
            }
        }, 50);
        
        // Stop checking after 5 seconds to prevent infinite loops in worst-case scenarios
        setTimeout(() => clearInterval(checkTailwind), 5000);
    </script>

    <style>
        body {
            background-color: #061024;
            color: #F8FAFC;
            overflow: hidden; /* Prevent scrolling, act like a slide deck */
            margin: 0;
            padding: 0;
        }

        /* Global Header for Logos */
        #global-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 2rem 4rem;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            z-index: 50;
            pointer-events: none; /* Let clicks pass through to slides */
        }

        .header-logo {
            height: 60px;
            object-fit: contain;
            filter: brightness(0) invert(1);
            opacity: 0.95;
            filter: drop-shadow(0px 4px 6px rgba(0,0,0,0.5));
            color: transparent;
            font-size: 0;
        }

        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.6s ease-in-out, visibility 0.6s ease-in-out;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #061024;
        }

        .slide.active {
            opacity: 1;
            visibility: visible;
            z-index: 10;
        }

        /* Ken Burns Animation Definition */
        @keyframes kenBurns {
            0% {
                transform: scale(1);
            }
            100% {
                transform: scale(1.08); /* Subtle 8% zoom */
            }
        }

        /* Image Presentation Slide - using contain to ensure no baked-in text is cut off */
        .slide-img {
            width: 100vw;
            height: 100vh;
            object-fit: contain;
            object-position: center;
            z-index: 1;
            transform-origin: center center;
            will-change: transform; /* Optimizes the animation rendering */
        }

        /* Trigger the Ken Burns effect ONLY when the slide is active */
        .slide.active .slide-img {
            animation: kenBurns 30s linear forwards; 
        }

        /* Navigation Controls */
        #controls {
            position: fixed;
            bottom: 30px;
            right: 40px;
            z-index: 100;
            display: flex;
            gap: 15px;
            opacity: 0.3;
            transition: opacity 0.3s ease;
        }

        #controls:hover {
            opacity: 1;
        }

        .nav-btn {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            backdrop-filter: blur(5px);
            transition: all 0.2s ease;
        }

        .nav-btn:hover {
            background: #D4FF00;
            color: #061024;
            border-color: #D4FF00;
        }

        /* Global Footer for Contact Info */
        .global-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 1.5rem;
            text-align: center;
            z-index: 20;
            pointer-events: none;
        }
        
        /* Progress Bar */
        #progress-bar {
            position: fixed;
            top: 0;
            left: 0;
            height: 4px;
            background-color: #D4FF00;
            z-index: 1000;
            transition: width 0.3s ease;
            box-shadow: 0 0 10px #D4FF00;
        }

        .tech-font {
            font-family: 'Space Grotesk', sans-serif;
            letter-spacing: 0.05em;
        }
    </style>
</head>

        </button>

            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const slides = document.querySelectorAll('.slide');
            const progressBar = document.getElementById('progress-bar');
            let currentSlide = 0;
            const totalSlides = slides.length;

            function updateSlide() {
                // Phase 1: Capture the outgoing slide's state so it doesn't snap back
                slides.forEach((slide, index) => {
                    if (slide.classList.contains('active') && index !== currentSlide) {
                        const img = slide.querySelector('.slide-img');
                        if (img) {
                            // Grab the exact scale at this millisecond
                            const currentTransform = window.getComputedStyle(img).transform;
                            // Freeze it by applying it as a hard inline style
                            img.style.transform = currentTransform;
                            // Kill the CSS animation so it doesn't instantly reset
                            img.style.animation = 'none';
                        }
                    }
                });

                // Phase 2: Update the active classes
                slides.forEach((slide, index) => {
                    slide.classList.remove('active');
                    
                    // Reset the incoming slide so it can properly start its animation from the beginning
                    if (index === currentSlide) {
                        const img = slide.querySelector('.slide-img');
                        if (img) {
                            img.style.transform = '';
                            img.style.animation = '';
                        }
                    }
                });
                
                slides[currentSlide].classList.add('active');

                // Phase 3: Update the progress bar
                const progress = ((currentSlide) / (totalSlides - 1)) * 100;
                progressBar.style.width = `${progress}%`;
            }

            function nextSlide() {
                if (currentSlide < totalSlides - 1) {
                    currentSlide++;
                    updateSlide();
                }
            }

            function prevSlide() {
                if (currentSlide > 0) {
                    currentSlide--;
                    updateSlide();
                }
            }

            function toggleFullScreen() {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen().catch(err => {
                        console.log(`Error attempting to enable fullscreen: ${err.message}`);
                    });
                } else {
                    if (document.exitFullscreen) {
                        document.exitFullscreen();
                    }
                }
            }

            document.getElementById('btn-next').addEventListener('click', nextSlide);
            document.getElementById('btn-prev').addEventListener('click', prevSlide);
            document.getElementById('btn-fullscreen').addEventListener('click', toggleFullScreen);

            document.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowRight' || e.key === 'Space' || e.key === 'Enter') {
                    nextSlide();
                } else if (e.key === 'ArrowLeft') {
                    prevSlide();
                }
            });

            let touchStartX = 0;
            let touchEndX = 0;

            document.addEventListener('touchstart', e => {
                touchStartX = e.changedTouches[0].screenX;
            });

            document.addEventListener('touchend', e => {
                touchEndX = e.changedTouches[0].screenX;
                handleSwipe();
            });

            function handleSwipe() {
                const swipeThreshold = 50; 
                if (touchEndX < touchStartX - swipeThreshold) {
                    nextSlide(); 
                }
                if (touchEndX > touchStartX + swipeThreshold) {
                    prevSlide(); 
                }
            }

            // Initial call to set up the first slide
            updateSlide();
        });
    </script>
