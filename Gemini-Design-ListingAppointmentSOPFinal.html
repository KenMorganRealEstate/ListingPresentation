    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #020617; /* slate-950 */
            color: #e2e8f0;
            overflow: hidden; /* App handles its own scrolling */
        }
        
        .font-mono {
            font-family: 'JetBrains Mono', monospace;
        }

        /* Smooth Accordion Transitions */
        .accordion-content {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
        }
        .accordion-content.open {
            max-height: 2000px;
            opacity: 1;
            margin-top: 1rem;
        }
        .accordion-content.closed {
            max-height: 0;
            opacity: 0;
            margin-top: 0;
        }

        /* Custom High-Tech Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #0f172a; 
        }
        ::-webkit-scrollbar-thumb {
            background: #334155; 
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #3b82f6; 
        }

        /* Connecting Flowchart Line */
        .flow-line {
            position: absolute;
            left: 2rem;
            top: 2rem;
            bottom: -2rem;
            width: 2px;
            background: linear-gradient(to bottom, #1e293b, #334155, #1e293b);
            z-index: 0;
        }

            color: #fca5a5;
            border: 1px solid rgba(220, 38, 38, 0.3);

            border-radius: 6px;
            font-size: 0.65rem;
            font-weight: 800;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin-right: 8px;
            vertical-align: middle;

</head>

        const listFreeholdData = [
            {
                phase: "Phase 1: Pre-Listing Research & Primer",
                description: "Handling TRESA compliance and legal due diligence before you even step into the house.",
                items: [
                    { id: "lf_due_diligence", title: "1. Pre-Listing Due Diligence", badge: "Office Research", color: "text-teal-400 border-teal-400/30 bg-teal-400/10", icon: "search", description: "Mandatory legal checks to perform BEFORE the appointment.", sections: [{ title: "Title, Ownership & Legal Advisory", steps: ["<span class='tag-dd'>[DUE DILIGENCE]</span> <strong>GeoWarehouse:</strong> Pull the property report to verify exact legal names on title. You cannot legally list unless all owners sign.", "<span class='tag-dd'>[DUE DILIGENCE]</span> <strong>Estates/POA:</strong> If deceased or using a POA, you MUST obtain the Certificate of Appointment of Estate Trustee or the POA document.", "<span class='tag-dd'>[DUE DILIGENCE]</span> <strong>Mortgage Check:</strong> Verify outstanding mortgage vs. estimated sale price. Does the seller have enough equity?", "<span class='tag-dd'>[DUE DILIGENCE]</span> <strong>Tax Arrears:</strong> Check if property taxes are up‑to‑date via the municipal portal.", "<span class='tag-dd'>[DUE DILIGENCE]</span> <strong>Lawyer:</strong> Advise the seller to retain a real estate lawyer early to handle title transfer, mortgage discharge, and statement of adjustments."] }] },
                    { id: "lf_pre_email", title: "2. Advance Email & RECO Delivery", badge: "Procedure & Script", color: "text-blue-400 border-blue-400/30 bg-blue-400/10", icon: "mail", description: "Send 24‑48 hours before your meeting.", sections: [{ title: "Email Template", steps: ["<span class='tag-mandatory'>[MANDATORY]</span> You must provide the RECO Guide before providing services.", "<div class='bg-slate-800/50 border border-slate-700 p-4 rounded mt-2 text-sm text-slate-300 italic border-l-4 border-l-blue-500'><strong>Subject:</strong> Looking forward to our meeting + Important Info<br><br>Hi [Client Name],<br><br>I am looking forward to our meeting tomorrow. Because the province recently updated the rules for real estate representation, I am required by law to provide you with the attached RECO Information Guide before we officially begin our services. Please give it a quick read-through. We will briefly touch on it tomorrow.<br><br>Best,<br>[Your Name]</div>"] }] }
                ]
            },
            {
                phase: "Phase 2: The Kitchen Table (Contracts)",
                description: "Command the room. Bring these forms printed. Secure wet-ink signatures.",
                items: [
                    { id: "lf_reco", title: "3. Setting the Agenda & RECO Sign-off", badge: "Dialogue", color: "text-blue-400 border-blue-400/30 bg-blue-400/10", icon: "message-circle", description: "Opening the meeting and TRESA acknowledgment.", sections: [{ title: "Script & Sign-off", steps: ["<span class='tag-script'>[SCRIPT]</span> <em>\"Did you have a chance to glance at the RECO guide I emailed over? It confirms that I am acting as your Designated Representative. My sole loyalty is to you, the Seller.\"</em>", "<span class='tag-mandatory'>[MANDATORY]</span> Have all Sellers sign and date the printed Page 13 Acknowledgement."] }] },
                    { id: "lf_form271", title: "4. OREA Form 271 — Listing Agreement", badge: "Paper Contract", color: "text-amber-400 border-amber-400/30 bg-amber-400/10", icon: "file-signature", description: "The core legal contract securing you as Designated Representative.", sections: [{ title: "Form Breakdown", steps: ["<span class='tag-mandatory'>[MANDATORY]</span> <strong>Designated Rep:</strong> Your exact name. (Crucial TRESA rule).", "<span class='tag-mandatory'>[MANDATORY]</span> <strong>Dates:</strong> Commencing and Expiring times.", "<span class='tag-mandatory'>[MANDATORY]</span> <strong>Commission:</strong> Total %, Co‑op %, and Holdover days.", "<span class='tag-ask'>[ASK SELLER]</span> <strong>HST on Commission:</strong> Confirm that HST is charged on top of the agreed commission. Clarify whether the stated commission includes or excludes HST.", "<span class='tag-dd'>[DUE DILIGENCE]</span> <span class='tag-ask'>[ASK SELLER]</span> <strong>Spousal Consent:</strong> Is it a matrimonial home and spouse isn't on title? They must sign Page 4.", "<span class='tag-mandatory'>[MANDATORY]</span> <strong>Schedule A:</strong> Ensure Casora's Schedule A is attached and initialled."] }] },
                    { id: "lf_fintrac", title: "5. FINTRAC ID Records", badge: "Paper Form", color: "text-amber-400 border-amber-400/30 bg-amber-400/10", icon: "fingerprint", description: "Federal anti-money laundering verification.", sections: [{ title: "Verification", steps: ["<span class='tag-mandatory'>[MANDATORY]</span> Check Driver's License or Passport. Copy ID Number and Expiry exactly.", "<span class='tag-ask'>[ASK SELLER]</span> Ask for their Principal Business/Occupation.", "<span class='tag-mandatory'>[MANDATORY]</span> Section D (Purpose): Check 'Residential Property' and 'Sale'.", "<span class='tag-mandatory'>[MANDATORY]</span> Determine if the client is a Politically Exposed Person (PEP), Head of an International Organization (HIO), or appears on any sanctions list (OFAC, OSFI). This is required under FINTRAC regulations."] }] },
                    { id: "lf_form244", title: "6. Form 244 & Lockbox Direction", badge: "Paper Contract", color: "text-amber-400 border-amber-400/30 bg-amber-400/10", icon: "lock", description: "Rules of engagement for offers and property access.", sections: [{ title: "Form 244 & Lockbox", steps: ["<span class='tag-ask'>[ASK SELLER]</span> <strong>Holding Offers:</strong> If holding, enter Date/Time and check YES or NO for Pre-emptive offers.", "<span class='tag-mandatory'>[MANDATORY]</span> <strong>Lockbox:</strong> Get signature authorizing the lockbox placement."] }] },
                    { id: "lf_form161", title: "7. OREA Form 161 (Disclosure)", badge: "Conditional Form", color: "text-red-400 border-red-400/30 bg-red-400/10", icon: "alert-triangle", description: "ONLY if you or a family member/Casora! own the property.", sections: [{ title: "When & How to use", steps: ["<span class='tag-mandatory'>[MANDATORY]</span> If YOU or the brokerage own the property, you must declare it using this form."] }] }
                ]
            },
            {
                phase: "Phase 3: Back-Office Polish & MLS",
                description: "Drafting the MLS data at your desk and sending for e-signature.",
                items: [
                    { id: "lf_mls", title: "8. PropTx 290 & BrokerBay", badge: "Digital Entry", color: "text-cyan-400 border-cyan-400/30 bg-cyan-400/10", icon: "monitor", description: "MLS data and showing instructions for FREEHOLD listings.", sections: [{ title: "Setup", steps: ["<span class='tag-mandatory'>[MANDATORY]</span> Use PropTx 290 (Freehold Sale).", "<span class='tag-mandatory'>[MANDATORY]</span> Fill room measurements, taxes, and legal description.", "<span class='tag-mandatory'>[MANDATORY]</span> Set up BrokerBay contacts and offer email.", "<span class='tag-mandatory'>[MANDATORY]</span> Email both to Seller via DocuSign/Authentisign for final approval before going live."] }] }
                ]
            },
            {

                ]
            }
        ];

        const listCondoData = [
            {
                phase: "Phase 1: Pre-Listing Condo Research",

                items: [
                    { id: "lc_due_diligence", title: "1. Condo Due Diligence", badge: "Office Research", color: "text-teal-400 border-teal-400/30 bg-teal-400/10", icon: "search", description: "Mandatory checks specific to condominium properties.", sections: [{ title: "Condo Verifications", steps: ["<span class='tag-dd'>[DUE DILIGENCE]</span> <strong>GeoWarehouse:</strong> Find Condominium Plan No., Legal Name of Condo Corp, Unit Number, Level No., and Building No.", "<span class='tag-dd'>[DUE DILIGENCE]</span> <strong>Parking/Locker:</strong> Verify if Parking and Locker are owned (Deeded) or Exclusive Use.", "<span class='tag-dd'>[DUE DILIGENCE]</span> <strong>Status Certificate:</strong> Does the Seller have a current Status Certificate? If not, advise them to order one (maximum fee $100 under the Condominium Act, 1998). The corporation must deliver it within 10 calendar days — plan ahead.", "<span class='tag-dd'>[DUE DILIGENCE]</span> <strong>Arrears:</strong> Ask the seller if they have any outstanding common expenses or special assessments owing to the condo corporation. Arrears affect net proceeds and can be a title lien.", "<span class='tag-dd'>[DUE DILIGENCE]</span> <strong>Maintenance Fee:</strong> Verify the exact monthly maintenance fee and what it includes.", "<span class='tag-dd'>[DUE DILIGENCE]</span> <strong>Lawyer:</strong> Advise the seller to retain a real estate lawyer early."] }] },
                    { id: "lc_pre_email", title: "2. Advance Email & RECO Delivery", badge: "Procedure & Script", color: "text-blue-400 border-blue-400/30 bg-blue-400/10", icon: "mail", description: "Send 24‑48 hours before your meeting.", sections: [{ title: "Email Template", steps: ["<span class='tag-mandatory'>[MANDATORY]</span> You must provide the RECO Guide before providing services.", "<div class='bg-slate-800/50 border border-slate-700 p-4 rounded mt-2 text-sm text-slate-300 italic border-l-4 border-l-emerald-500'><strong>Subject:</strong> Looking forward to our condo listing meeting + Important Info<br><br>Hi [Client Name],<br><br>I am looking forward to our meeting. Because the province updated the rules for real estate representation, I am required by law to provide you with the attached RECO Information Guide before we officially begin. Please give it a quick read-through.<br><br>Also, if you have a current Status Certificate, please have it ready for our meeting.<br><br>Best,<br>[Your Name]</div>"] }] }
                ]
            },
            {
                phase: "Phase 2: The Kitchen Table (Condo Contracts)",
                description: "Secure wet-ink signatures. Condos have additional considerations.",
                items: [
                    { id: "lc_reco", title: "3. RECO Sign-off & Agenda", badge: "Dialogue", color: "text-blue-400 border-blue-400/30 bg-blue-400/10", icon: "message-circle", description: "TRESA acknowledgment and condo-specific agenda.", sections: [{ title: "Script & Sign-off", steps: ["<span class='tag-script'>[SCRIPT]</span> <em>\"Did you have a chance to glance at the RECO guide? It confirms that I am acting as your Designated Representative. For your condo specifically, we'll need to discuss the Status Certificate, maintenance fees, and condo corporation rules.\"</em>", "<span class='tag-mandatory'>[MANDATORY]</span> Have all Sellers sign and date the printed Page 13 Acknowledgement."] }] },
                    { id: "lc_form271", title: "4. Form 271 — Listing Agreement (Condo)", badge: "Paper Contract", color: "text-amber-400 border-amber-400/30 bg-amber-400/10", icon: "file-signature", description: "The core legal contract — condo specifics matter.", sections: [{ title: "Condo-Specific Form Breakdown", steps: ["<span class='tag-mandatory'>[MANDATORY]</span> <strong>Designated Rep:</strong> Your exact name.", "<span class='tag-mandatory'>[MANDATORY]</span> <strong>Legal Description:</strong> Must include Condominium Plan No. and Unit No. exactly as per Registry.", "<span class='tag-mandatory'>[MANDATORY]</span> <strong>Dates:</strong> Commencing and Expiring times.", "<span class='tag-mandatory'>[MANDATORY]</span> <strong>Commission:</strong> Total %, Co‑op %, and Holdover days.", "<span class='tag-ask'>[ASK SELLER]</span> <strong>HST on Commission:</strong> Confirm that HST is charged on top of the agreed commission.", "<span class='tag-mandatory'>[MANDATORY]</span> <strong>Schedule A:</strong> Attach Casora's Schedule A. Consider adding a clause about Status Certificate availability.", "<span class='tag-dd'>[DUE DILIGENCE]</span> <span class='tag-ask'>[ASK SELLER]</span> <strong>Spousal Consent:</strong> Is it a matrimonial home? Non-titled spouse must sign Page 4."] }] },
                    { id: "lc_fintrac", title: "5. FINTRAC ID Records", badge: "Paper Form", color: "text-amber-400 border-amber-400/30 bg-amber-400/10", icon: "fingerprint", description: "Federal anti-money laundering verification.", sections: [{ title: "Verification", steps: ["<span class='tag-mandatory'>[MANDATORY]</span> Check Driver's License or Passport. Copy ID Number and Expiry exactly.", "<span class='tag-ask'>[ASK SELLER]</span> Ask for their Principal Business/Occupation.", "<span class='tag-mandatory'>[MANDATORY]</span> Section D (Purpose): Check 'Residential Property' and 'Sale'.", "<span class='tag-mandatory'>[MANDATORY]</span> Determine if the client is a PEP/HIO."] }] },
                    { id: "lc_form244", title: "6. Form 244 & Lockbox Direction", badge: "Paper Contract", color: "text-amber-400 border-amber-400/30 bg-amber-400/10", icon: "lock", description: "Offer strategy and access — condos may have concierge or fob restrictions.", sections: [{ title: "Form 244 & Lockbox", steps: ["<span class='tag-ask'>[ASK SELLER]</span> <strong>Holding Offers:</strong> If holding, enter Date/Time.", "<span class='tag-mandatory'>[MANDATORY]</span> <strong>Lockbox:</strong> Get signature authorizing the lockbox. Note any condo building restrictions on lockbox placement.", "<span class='tag-optional'>[OPTIONAL]</span> Check if the condo has a concierge — you may need to coordinate showing instructions differently."] }] },
                    { id: "lc_form161", title: "7. OREA Form 161 (Disclosure)", badge: "Conditional Form", color: "text-red-400 border-red-400/30 bg-red-400/10", icon: "alert-triangle", description: "ONLY if you or Casora! have an interest in the property.", sections: [{ title: "When & How to use", steps: ["<span class='tag-mandatory'>[MANDATORY]</span> If YOU or the brokerage own the condo, you must declare it using this form."] }] }
                ]
            },
            {
                phase: "Phase 3: Condo MLS Data Entry",
                description: "Using the specific condo listing form.",
                items: [
                    { id: "lc_mls", title: "8. PropTx 291 & BrokerBay (Condo)", badge: "Digital Entry", color: "text-cyan-400 border-cyan-400/30 bg-cyan-400/10", icon: "building", description: "Condo-specific MLS data and showing instructions.", sections: [{ title: "Condo MLS Setup", steps: ["<span class='tag-mandatory'>[MANDATORY]</span> Use PropTx 291 (Condo Sale) — NOT Form 290.", "<span class='tag-mandatory'>[MANDATORY]</span> Must list: Condo Corp Name, Condo Plan No., Maintenance Fee amount, and what is included.", "<span class='tag-mandatory'>[MANDATORY]</span> Specify Parking/Locker Type: 'Owned' vs 'Exclusive Use'.", "<span class='tag-mandatory'>[MANDATORY]</span> Set up BrokerBay contacts and offer email. Send to Seller via DocuSign for approval."] }] }

                    { id: "lc_dealsummary", title: "9. CASORA Deal Summary (Condo)", badge: "Internal Form", color: "text-purple-400 border-purple-400/30 bg-purple-400/10", icon: "briefcase", description: "Submitted when the condo deal goes FIRM.", sections: [{ title: "Financials & Submission", steps: ["<span class='tag-mandatory'>[MANDATORY]</span> Enter the exact Deposit held by Casora.", "<span class='tag-mandatory'>[MANDATORY]</span> Break down commission.", "<span class='tag-mandatory'>[MANDATORY]</span> Ensure the Status Certificate condition has been <strong>satisfied</strong> (Form 124) OR <strong>waived</strong> (Form 123).", "<span class='tag-mandatory'>[MANDATORY]</span> Submit with Firm APS, Form 271, FINTRAC, RECO Ack, Form 244, waiver/fulfillment form, and any other waivers."] }] }
                ]
            }
        ];

        const listLeaseData = [
            {
                phase: "Phase 1: Landlord Agency Setup",
                description: "Representing a Landlord — TRESA applies to leases too.",
                items: [
                    { id: "ll_due_diligence", title: "1. Landlord Due Diligence", badge: "Office Research", color: "text-teal-400 border-teal-400/30 bg-teal-400/10", icon: "search", description: "Verify the Landlord's legal standing and advise on obligations.", sections: [{ title: "Verification & Advisory", steps: ["<span class='tag-dd'>[DUE DILIGENCE]</span> <strong>GeoWarehouse:</strong> Verify Landlord's name matches title exactly.", "<span class='tag-dd'>[DUE DILIGENCE]</span> <strong>Rental Legality:</strong> Confirm the property is zoned for rental and there are no condo bylaw restrictions.", "<span class='tag-dd'>[DUE DILIGENCE]</span> <strong>Existing Lease:</strong> Know the correct notice if tenanted (N11, N12, N13).", "<span class='tag-dd'>[DUE DILIGENCE]</span> <strong>Insurance:</strong> Advise the landlord to obtain landlord-specific insurance.", "<span class='tag-dd'>[DUE DILIGENCE]</span> <strong>Rent Control:</strong> Check if exempt (post-Nov 15, 2018) or subject to the provincial guideline."] }] },
                    { id: "ll_reco_email", title: "2. RECO Guide Delivery", badge: "Compliance", color: "text-blue-400 border-blue-400/30 bg-blue-400/10", icon: "mail", description: "TRESA compliance before providing services.", sections: [{ title: "Delivery", steps: ["<span class='tag-mandatory'>[MANDATORY]</span> Email RECO Guide to Landlord 24‑48 hours before meeting.", "<span class='tag-mandatory'>[MANDATORY]</span> At meeting: Have Landlord sign Page 13 Acknowledgement.", "<span class='tag-script'>[SCRIPT]</span> <em>\"TRESA requires me to explain that as your Designated Representative, my sole loyalty is to you, the Landlord.\"</em>"] }] }
                ]
            },
            {
                phase: "Phase 2: Landlord Contracts",
                description: "Securing the Landlord representation agreement.",
                items: [
                    { id: "ll_form272", title: "3. Form 272 — Landlord Representation", badge: "Core Contract", color: "text-amber-400 border-amber-400/30 bg-amber-400/10", icon: "file-signature", description: "Authority to offer for LEASE.", sections: [{ title: "Key Fields", steps: ["<span class='tag-mandatory'>[MANDATORY]</span> <strong>Designated Representative:</strong> Your exact name.", "<span class='tag-mandatory'>[MANDATORY]</span> <strong>Commission:</strong> Usually 'One month's rent' or 'One half of one month's rent'.", "<span class='tag-mandatory'>[MANDATORY]</span> <strong>Term:</strong> Commencing and Expiring dates.", "<span class='tag-ask'>[ASK LANDLORD]</span> <strong>Rent Amount:</strong> Confirm the asking rent."] }] },
                    { id: "ll_fintrac", title: "4. FINTRAC ID Verification", badge: "Compliance", color: "text-amber-400 border-amber-400/30 bg-amber-400/10", icon: "fingerprint", description: "Anti-money laundering — applies to leases too.", sections: [{ title: "Verification", steps: ["<span class='tag-mandatory'>[MANDATORY]</span> Verify Landlord's physical ID.", "<span class='tag-mandatory'>[MANDATORY]</span> Section D: Check 'Residential Property' and Purpose: 'Lease/Rent'.", "<span class='tag-mandatory'>[MANDATORY]</span> Check PEP/HIO status."] }] }
                ]
            },
            {

                items: [

                            <span className="text-xs font-mono text-slate-400 uppercase tracking-wider">System Online</span>
                        </div>
                    </aside>

                    {/* MAIN CONTENT AREA */}
                    <main className="flex-1 flex flex-col relative overflow-hidden bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] bg-blend-soft-light bg-slate-950">
                        {/* Ambient Background Glow */}
                        <div className="absolute top-0 left-1/4 w-96 h-96 bg-blue-600/10 rounded-full blur-[120px] pointer-events-none"></div>
                        <div className="absolute bottom-0 right-1/4 w-96 h-96 bg-cyan-600/10 rounded-full blur-[120px] pointer-events-none"></div>

                        {/* Top Header */}
                        <header className="glass-panel sticky top-0 z-10 px-8 py-5 flex justify-between items-center border-b border-slate-800/80">
                            <div>
                                <h1 className="text-2xl font-black text-white tracking-tight flex items-center gap-3">
                                    <i data-lucide={current.icon} className={`text-${current.color}-400 w-6 h-6`}></i>
                                    {current.title} <span className="text-slate-500 font-light">Workflow</span>
                                </h1>
                                <p className="text-sm text-slate-400 mt-1">Execute standard procedures and maintain compliance.</p>
                            </div>

                            {/* Progress & Ken Morgan Logo */}
                            <div className="flex items-center space-x-8">
                                <div className="text-right">
                                    <div className="flex items-end justify-end space-x-2 mb-1">
                                        <span className={`text-2xl font-black text-${current.color}-400`}>{Math.round(progressPercentage)}%</span>
                                        <span className="text-slate-500 text-sm font-mono pb-1">({completedCount}/{totalItems})</span>
                                    </div>
                                    <div className="w-32 h-1.5 bg-slate-800 rounded-full overflow-hidden">
                                        <div 
                                            className={`h-full bg-${current.color}-500 rounded-full transition-all duration-700 shadow-[0_0_10px_rgba(6,182,212,0.5)]`}
                                            style={{ width: `${progressPercentage}%` }}
                                        ></div>
                                    </div>
                                </div>
                                <div className="hidden md:block h-12 w-px bg-slate-700/50"></div>
                                <img src="https://github.com/KenMorganRealEstate/Home/blob/main/KenMorganLogoBestOneTransparent.png?raw=true" alt="Ken Morgan Logo" className="h-12 object-contain hidden md:block opacity-90" />
                            </div>
                        </header>

                        {/* Flowchart Content Scroll Area */}
                        <div className="flex-1 overflow-y-auto p-8 lg:p-12 custom-scrollbar relative z-0">
                            <div className="max-w-4xl mx-auto relative">
                                
                                {/* Vertical Flow Line */}
                                <div className="flow-line hidden sm:block"></div>

                                <div className="space-y-16">
                                    {currentData.map((phaseData, phaseIdx) => (
                                        <div key={phaseIdx} className="relative z-10">
                                            
                                            {/* Phase Header Node */}
                                            <div className="flex items-center mb-8 relative">
                                                <div className="hidden sm:flex absolute left-8 -translate-x-1/2 w-4 h-4 rounded-full bg-slate-800 border-2 border-slate-600 shadow-[0_0_0_4px_rgba(15,23,42,1)] z-10 items-center justify-center">
                                                    <div className="w-1.5 h-1.5 bg-slate-400 rounded-full"></div>
                                                </div>
                                                <div className="sm:ml-16 bg-slate-800/80 border border-slate-700/50 px-6 py-3 rounded-lg shadow-lg backdrop-blur-sm">
                                                    <h3 className={`text-sm font-black text-${current.color}-400 uppercase tracking-widest`}>{phaseData.phase}</h3>
                                                    <p className="text-slate-400 text-sm mt-1">{phaseData.description}</p>
                                                </div>
                                            </div>

                                            {/* Phase Items (Tasks) */}
                                            <div className="space-y-6 sm:ml-16">
                                                {phaseData.items.map((item) => {
                                                    const isExpanded = expandedNodes[item.id];
                                                    const isCompleted = completedItems[item.id];
                                                    
                                                    return (
                                                        <div key={item.id} className="relative group">
                                                            {/* Line Connector to Card */}
                                                            <div className="hidden sm:block absolute left-[-2rem] top-1/2 w-8 h-px bg-slate-700 group-hover:bg-slate-500 transition-colors"></div>
                                                            {/* Node Dot */}
                                                            <div className={`hidden sm:block absolute left-[-2rem] top-1/2 -translate-x-1/2 -translate-y-1/2 w-3 h-3 rounded-full border-2 transition-all duration-300 ${isCompleted ? `bg-${current.color}-500 border-${current.color}-300 shadow-[0_0_10px_rgba(6,182,212,0.8)]` : 'bg-slate-900 border-slate-600'}`}></div>

                                                            {/* Task Card */}
                                                            <div className={`glass-panel rounded-xl transition-all duration-300 border ${isCompleted ? `border-${current.color}-500/40 bg-slate-800/40 shadow-[0_0_15px_rgba(6,182,212,0.05)]` : 'border-slate-700/50 hover:border-slate-600 hover:bg-slate-800/30'}`}>
                                                                
                                                                {/* Card Header (Clickable for Accordion) */}
                                                                <div className="p-5 flex items-center justify-between cursor-pointer" onClick={() => toggleAccordion(item.id)}>
                                                                    <div className="flex items-center space-x-4 flex-1">
                                                                        <div className={`p-2.5 rounded-lg border flex-shrink-0 transition-colors ${isCompleted ? `bg-${current.color}-900/30 border-${current.color}-500/50 text-${current.color}-400` : 'bg-slate-800 border-slate-700 text-slate-400'}`}>
                                                                            <i data-lucide={item.icon} className="w-5 h-5"></i>
                                                                        </div>
                                                                        <div>
                                                                            <div className="flex flex-wrap items-center gap-2 mb-1">
                                                                                <h4 className={`text-lg font-bold transition-colors ${isCompleted ? 'text-slate-400' : 'text-slate-100'}`}>{item.title}</h4>
                                                                                <span className={`px-2 py-0.5 rounded text-[10px] font-bold uppercase tracking-wider border backdrop-blur-sm ${item.color}`}>{item.badge}</span>
                                                                            </div>
                                                                            <p className="text-slate-400 text-sm">{item.description}</p>
                                                                        </div>
                                                                    </div>
                                                                    
                                                                    {/* Controls Container */}
                                                                    <div className="flex items-center space-x-6 ml-4">
                                                                        <div className="flex flex-col items-center" onClick={(e) => e.stopPropagation()}>
                                                                            <ToggleSwitch checked={!!isCompleted} onChange={() => toggleCompletion(item.id)} />
                                                                        </div>
                                                                        <div className="w-px h-8 bg-slate-700 hidden sm:block"></div>
                                                                        <i data-lucide="chevron-down" className={`w-5 h-5 text-slate-500 transition-transform duration-300 hidden sm:block ${isExpanded ? 'rotate-180 text-white' : ''}`}></i>
                                                                    </div>
                                                                </div>

                                                                {/* Card Expanded Content */}
                                                                <div className={`accordion-content ${isExpanded ? 'open' : 'closed'}`}>
                                                                    <div className="px-5 pb-5 pt-2 border-t border-slate-700/50 bg-slate-900/30 rounded-b-xl">
                                                                        <div className="space-y-4 pt-2">
                                                                            {item.sections.map((section, sIdx) => (
                                                                                <div key={sIdx} className="bg-slate-950/50 border border-slate-800 p-4 rounded-lg">
                                                                                    <h5 className="font-bold text-slate-300 mb-3 pb-2 border-b border-slate-800 text-sm uppercase tracking-wider">{section.title}</h5>
                                                                                    <ul className="space-y-3">
                                                                                        {section.steps.map((step, idx) => (
                                                                                            <li key={idx} className="flex items-start text-slate-400 text-[13.5px] leading-relaxed">
                                                                                                <div className="mt-1.5 mr-3 w-1.5 h-1.5 rounded-full bg-slate-600 flex-shrink-0"></div>
                                                                                                <span dangerouslySetInnerHTML={{ __html: step }}></span>
                                                                                            </li>
                                                                                        ))}
                                                                                    </ul>
                                                                                </div>
                                                                            ))}
                                                                        </div>
                                                                    </div>
                                                                </div>
                                                            </div>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            {/* Footer */}
                            <footer className="mt-20 pt-8 border-t border-slate-800/50 text-center relative z-10 pb-8">
                                <p className="text-slate-500 text-xs font-mono uppercase tracking-widest">
                                    Casora! Realty Inc. • Agency Command Center<br/>
                                    <span className="opacity-60">For internal use only. Consult Broker of Record if unsure.</span>
                                </p>
                            </footer>
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
